# Run the Marrow backbone locally or on any Docker host (builds the released backbone from GitHub).
#   MARROW_TOKEN=$(openssl rand -hex 16) docker compose -f deploy/docker-compose.yml up --build
services:
  marrow:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    environment:
      MARROW_TOKEN: ${MARROW_TOKEN:?set MARROW_TOKEN to a shared secret}
      MARROW_DATA: /data
    volumes:
      - marrow-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  marrow-data:
