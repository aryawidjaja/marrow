<style>
  :root {
    --bg: #0d0f14; --panel: #151922; --panel2: #1b2029; --line: #262b36;
    --text: #e6e9ef; --muted: #8b93a4; --accent: #6ea8fe; --gold: #f5c518;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--text); overflow: hidden;
    font: 13px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; flex-wrap: wrap;
    row-gap: 8px; border-bottom: 1px solid var(--line); background: var(--bg); z-index: 5; }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; font-weight: 600; display: flex; align-items: center; }
  header h1 span { color: var(--muted); font-weight: 400; }
  header h1 .mark { color: var(--gold); font-weight: 700; font-size: 17px; margin-right: 1px; }
  .brand-wm { height: 18px; width: auto; display: block; }
  .spacer { flex: 1; }
  button, .seg { background: var(--panel); color: var(--text); border: 1px solid var(--line);
    padding: 6px 11px; border-radius: 7px; cursor: pointer; font-size: 12px; }
  button:hover { border-color: #3a4152; }
  button.on { background: var(--accent); border-color: var(--accent); color: #06101f; font-weight: 600; }
  .seg { display: inline-flex; padding: 0; overflow: hidden; }
  .seg button { border: 0; border-radius: 0; }
  input[type=search], select, .modal-card input, .modal-card textarea, .modal-card select {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    padding: 6px 10px; border-radius: 7px; font-size: 12px; }
  input[type=search] { width: 190px; }
  select#proj { max-width: 190px; cursor: pointer; }
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none;
    align-items: center; justify-content: center; z-index: 20; }
  #modal.show { display: flex; }
  .modal-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; width: 480px; max-width: 92vw; max-height: 86vh; overflow: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .modal-card h3 { margin: 0 0 12px; font-size: 15px; }
  .modal-card label { display: block; color: var(--muted); font-size: 11px; margin: 10px 0 4px; }
  .modal-card input, .modal-card textarea, .modal-card select { width: 100%; }
  .modal-card textarea { resize: vertical; font-family: inherit; line-height: 1.5; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .modal-card hr { border: 0; border-top: 1px solid var(--line); margin: 18px 0; }
  .modal-card p { margin: 8px 0; line-height: 1.55; }
  .modal-card .dim { color: var(--muted); }
  .modal-card code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .row-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .row-item .dim { color: var(--muted); font-size: 11px; flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .brow { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 5px 8px; border-radius: 6px; cursor: pointer; }
  .brow:hover { background: var(--panel2); }
  .brow .nav { flex: 1; cursor: pointer; }
  .brow small { color: var(--accent); }
  #detail .acts { display: flex; gap: 8px; margin-top: 12px; }
  #detail .acts button { font-size: 11px; padding: 4px 10px; }
  .danger { color: #ff6b6b; }
  .pill { font-size: 10px; padding: 1px 7px; border-radius: 9px; background: var(--panel2);
    color: var(--muted); border: 1px solid var(--line); vertical-align: middle; }
  .pill.on { background: rgba(110,168,254,.14); color: var(--accent); border-color: transparent; }
  .sharebox:empty { display: none; }
  .sharebox { padding: 2px 0 8px; }
  .sharegrid { display: flex; flex-direction: column; gap: 6px; }
  .sharegrid input { background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 6px 8px; font-size: 12px; }
  .sharebtns { display: flex; gap: 8px; }
  main { display: grid; grid-template-columns: 250px 1fr; height: calc(100vh - 49px); }
  aside { border-right: 1px solid var(--line); background: var(--panel); overflow: auto; padding: 8px 0; }
  .tree-group > .row { font-weight: 600; }
  .row { display: flex; align-items: center; gap: 7px; padding: 3px 12px; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row:hover { background: var(--panel2); }
  .row .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  .row .count { color: var(--muted); font-size: 11px; margin-left: auto; }
  .kids { display: none; }
  .kids.open { display: block; }
  .leaf { padding-left: 30px; color: var(--muted); }
  .leaf:hover, .leaf.sel { color: var(--text); }
  .caret { color: var(--muted); width: 10px; display: inline-block; transition: transform .12s; }
  .caret.open { transform: rotate(90deg); }
  .stage { position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  #detail { position: absolute; top: 12px; right: 12px; width: 300px; max-height: calc(100% - 24px);
    overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; display: none; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  #detail.show { display: block; }
  #detail .k { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  #detail h3 { margin: 4px 0 10px; font-size: 15px; }
  #detail .body { color: #cdd3df; white-space: pre-wrap; font-size: 12px; }
  #detail .more { background: none; border: 0; color: var(--accent); cursor: pointer; padding: 3px 0; font-size: 12px; }
  #detail .meta { margin-top: 10px; color: var(--muted); font-size: 11px; }
  #detail .x { position: absolute; top: 8px; right: 10px; color: var(--muted); cursor: pointer; }
  .legend { position: absolute; left: 12px; bottom: 12px; background: rgba(21,25,34,.9);
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 11px; width: 232px; }
  .legend .li { display: flex; align-items: center; gap: 8px; padding: 2px 0; color: var(--muted); }
  .legend .lg-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
    color: var(--text); font-weight: 600; margin-bottom: 5px; }
  .legend .lg-sub { color: var(--text); font-weight: 600; margin: 9px 0 3px; }
  .legend .lg-help { color: var(--accent); cursor: pointer; font-weight: 400; font-size: 10px; white-space: nowrap; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
  .legend .edge { width: 18px; height: 3px; border-radius: 2px; flex: 0 0 auto; }
  .legend .lg-note { display: none; margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line);
    color: var(--muted); line-height: 1.5; }
  .legend .lg-note.show { display: block; }
  .legend .lg-note b { color: var(--text); font-weight: 600; }
  .hint { position: absolute; left: 12px; top: 12px; color: var(--muted); font-size: 11px;
    background: rgba(21,25,34,.7); padding: 4px 9px; border-radius: 7px; }
  #toast { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%);
    background: var(--accent); color: #06101f; font-weight: 600; padding: 7px 14px; border-radius: 8px;
    font-size: 12px; opacity: 0; transition: opacity .2s; pointer-events: none; }
  #toast.show { opacity: 1; }
  .tip { position: absolute; pointer-events: none; background: #0b0e13; border: 1px solid var(--line);
    padding: 5px 9px; border-radius: 7px; font-size: 12px; max-width: 260px; display: none; z-index: 9; }
  #edgemenu { position: absolute; display: none; z-index: 12; background: var(--panel);
    border: 1px solid var(--line); border-radius: 9px; padding: 6px; box-shadow: 0 12px 32px rgba(0,0,0,.5); min-width: 180px; }
  #edgemenu .em-title { font-size: 11px; color: var(--muted); padding: 4px 8px 6px; text-transform: capitalize; }
  #edgemenu button { display: block; width: 100%; text-align: left; border: 0; background: none;
    padding: 6px 8px; border-radius: 6px; font-size: 12px; }
  #edgemenu button:hover { background: var(--panel2); }
  #channel { position: absolute; inset: 0; display: none; overflow: auto; background: var(--bg); padding: 22px; }
  #channel.show { display: block; }
  #channel .wrap { max-width: 720px; margin: 0 auto; }
  #channel .ch-head { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  #channel .thread { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 14px; }
  #channel .msg { display: flex; flex-direction: column; margin: 8px 0; max-width: 82%; }
  #channel .msg .who { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  #channel .msg .bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.45; }
  #channel .msg.ask { align-self: flex-start; }
  #channel .msg.ask .bubble { background: var(--panel2); border-top-left-radius: 4px; }
  #channel .msg.reply { align-self: flex-end; align-items: flex-end; }
  #channel .msg.reply .bubble { background: #24406b; border-top-right-radius: 4px; }
  #channel .empty { color: var(--muted); text-align: center; margin-top: 60px; }
</style>
</head>

<div id="modal"><div class="modal-card"></div></div>
<script>
const palette = ["#6ea8fe","#46d39a","#ff8f5d","#c77dff","#ffd166","#4cc9f0","#f072b6","#90be6d","#e56b6f","#7bdff2"];
const kindColor = { decision:"#6ea8fe", fact:"#46d39a", entity:"#c77dff", session:"#ffd166", skill:"#ff8f5d", project:"#8b93a4", core:"#f5c518" };
// Edge types are real relationships, each its own colour so the graph is legible.
const edgeStyle = {
  ref:      { color: "rgba(255,120,90,0.65)",  label: "explicit link" },
  topic:    { color: "rgba(110,168,254,0.30)", label: "shared topic" },
  tag:      { color: "rgba(70,211,154,0.32)",  label: "shared tag" },
  semantic: { color: "rgba(199,125,255,0.45)", label: "related meaning" },
  user:     { color: "rgba(245,197,24,0.65)",  label: "you linked" },
  hub:      { color: "rgba(245,197,24,0.30)",  label: "core ↔ project" },
  cluster:  { color: "rgba(120,130,150,0.18)", label: "in project" },
};
const colorMap = {};
function colorFor(v, node) {
  if (node.kind === "core") return "#f5c518";
  if (v === "project") return kindColor[node.kind] || "#8b93a4";
  if (node.kind === "project") return "#8b93a4";
  if (!(node.group in colorMap)) colorMap[node.group] = palette[Object.keys(colorMap).length % palette.length];
  return colorMap[node.group];
}

let view = "project", raw = { nodes: [], links: [] }, nodes = [], links = [], byId = {};
let filter = "", selected = null, linkMode = false, linkFrom = null, heat = 1, showSemantic = true;
let project = "", projects = [];
const pq = (lead) => project ? (lead || "?") + "project=" + encodeURIComponent(project) : "";
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let T = { k: 1, x: 0, y: 0 };

async function loadProjects() {
  const d = await (await fetch("/api/projects")).json();
  projects = d.projects || [];
  const sel = document.getElementById("proj");
  sel.innerHTML = projects.map(p => `<option value="${esc(p.project)}">${esc(p.name)}</option>`).join("")
    + `<option value="core">core (you)</option>`;
  if (!projects.some(p => p.project === project) && project !== "core") project = projects[0] ? projects[0].project : "";
  sel.value = project;
}

async function load() {
  const url = view === "project" ? "/api/graph" + pq() : "/api/hive";
  raw = await (await fetch(url)).json();
  for (const k in colorMap) delete colorMap[k];
  byId = {};
  nodes = raw.nodes.map(n => ({ ...n, x: (Math.random()-.5)*600, y: (Math.random()-.5)*600, vx: 0, vy: 0 }));
  nodes.forEach(n => byId[n.id] = n);
  links = raw.links.filter(l => byId[l.source] && byId[l.target]).map(l => ({ ...l, s: byId[l.source], t: byId[l.target] }));
  assignAnchors();
  detectCommunities();
  buildTree(); buildLegend(); fit(); heat = 1;
}

// In hive view, give each project its own region on a ring around the core so clusters separate
// instead of piling on top of each other. Nodes start near their anchor and a gentle force holds
// them there while links still pull related neurons together.
function assignAnchors() {
  if (view !== "hive") { nodes.forEach(n => { n.ax = n.ay = null; }); return; }
  const groups = [...new Set(nodes.map(n => n.group))].filter(g => g !== "core");
  const R = 520 + groups.length * 90;
  const ang = {};
  groups.forEach((g, i) => ang[g] = (i / Math.max(1, groups.length)) * Math.PI * 2);
  for (const n of nodes) {
    if (n.group === "core") { n.ax = 0; n.ay = 0; }
    else { n.ax = Math.cos(ang[n.group]) * R; n.ay = Math.sin(ang[n.group]) * R; }
    n.x = n.ax + (Math.random() - .5) * 160;
    n.y = n.ay + (Math.random() - .5) * 160;
  }
}

function buildLegend() {
  const el = document.getElementById("legend");
  const dot = (c, label) => `<div class="li"><span class="dot" style="background:${c}"></span>${label}</div>`;
  const edge = (c, label) => `<div class="li"><span class="edge" style="background:${c}"></span>${label}</div>`;

  let neurons;
  if (view === "project") {
    neurons = [...new Set(nodes.map(n => n.kind))].filter(k => k !== "core")
      .map(k => dot(kindColor[k] || "#8b93a4", k)).join("");
  } else {
    neurons = dot("#f5c518", "core (you)") +
      [...new Set(nodes.map(n => n.group))].filter(g => g !== "core")
        .map(g => dot(colorFor("hive", { group: g, kind: "x" }), g)).join("");
  }

  const present = new Set(links.map(l => l.rel));
  const conns = ["ref", "topic", "tag", "semantic", "hub", "cluster", "user"]
    .filter(r => present.has(r) && (r !== "semantic" || showSemantic) && !(view === "hive" && r === "cluster")).map(r => {
    const label = r === "tag" && view === "hive" ? "shared tag (bridge)" : edgeStyle[r].label;
    return edge(edgeStyle[r].color, label);
  }).join("");

  const how = view === "hive"
    ? "Every neuron is a memory. Links are real, not random: two memories connect when they share a <b>topic</b> or a <b>tag</b> the agent saved. Memories also link to their <b>project</b>, and two projects bridge when they share a tag. Bigger neuron = more connections."
    : "Every neuron is a memory. Links are real, not random: two memories connect when they share a <b>topic</b> or a <b>tag</b> the agent saved on them. Draw your own with ✎ Link. Bigger neuron = more connections.";

  el.innerHTML =
    `<div class="lg-head">Neurons<span class="lg-help" id="lg-toggle">ⓘ how it works</span></div>` +
    neurons +
    `<div class="lg-sub">Connections</div>` + conns +
    `<div class="lg-note" id="lg-note">${how}</div>`;
  document.getElementById("lg-toggle").onclick = () =>
    document.getElementById("lg-note").classList.toggle("show");
}

function buildTree() {
  const t = document.getElementById("tree");
  const groups = {};
  for (const n of nodes) {
    if (n.kind === "core" || n.kind === "project") continue;
    const g = view === "project" ? n.kind : n.group;
    (groups[g] = groups[g] || []).push(n);
  }
  t.innerHTML = "";
  for (const g of Object.keys(groups).sort()) {
    const wrap = document.createElement("div"); wrap.className = "tree-group";
    const head = document.createElement("div"); head.className = "row";
    const c = view === "project" ? (kindColor[g] || "#8b93a4") : colorFor("hive", { group: g, kind: "x" });
    head.innerHTML = `<span class="caret">▶</span><span class="dot" style="background:${c}"></span>${g}<span class="count">${groups[g].length}</span>`;
    const kids = document.createElement("div"); kids.className = "kids";
    groups[g].sort((a,b) => (a.label||"").localeCompare(b.label||"")).forEach(n => {
      const leaf = document.createElement("div"); leaf.className = "row leaf"; leaf.textContent = n.label || n.id;
      leaf.dataset.id = n.id;
      leaf.onclick = () => select(n);
      kids.appendChild(leaf);
    });
    head.onclick = () => { kids.classList.toggle("open"); head.firstChild.classList.toggle("open"); };
    wrap.appendChild(head); wrap.appendChild(kids); t.appendChild(wrap);
  }
}

// How far a neuron may drift from its cluster's centre. Hard boundaries mean nothing can ever be
// flung off into empty space, no matter how the forces balance.
const HIVE_RADIUS = 300, PROJECT_RADIUS = 620;

function tick() {
  // The model, top to bottom:
  //  - repulsion (1/d²) spreads neurons apart so they don't overlap;
  //  - short, firm links pull connected neurons into tight flowers (a topic/tag hub + its petals);
  //  - a gentle pull toward each community's centre separates the sub-clusters into their own bubbles;
  //  - every neuron is kept inside its project's region (hive) or the canvas (project) by a hard clamp,
  //    so lone, link-less neurons stay home instead of scattering.
  const rep = view === "project" ? 2800 : 2000;
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i+1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy+.01;
      const f = rep/d2, d = Math.sqrt(d2), ux = dx/d, uy = dy/d;
      a.vx += ux*f; a.vy += uy*f; b.vx -= ux*f; b.vy -= uy*f;
    }
  }
  for (const l of links) {
    // Skip the in-project spokes in the hive: they'd make each project a 150-arm starburst. The
    // project's region already groups its neurons; real content links give it internal structure.
    if (view === "hive" && l.rel === "cluster") continue;
    let dx = l.t.x-l.s.x, dy = l.t.y-l.s.y, d = Math.hypot(dx,dy)+.01;
    const rest = l.rel === "hub" ? 180 : l.rel === "semantic" ? 62 : 52;
    const k = l.rel === "hub" ? 0.01 : 0.06;
    const f = (d-rest)*k, ux = dx/d, uy = dy/d;
    l.s.vx += ux*f; l.s.vy += uy*f; l.t.vx -= ux*f; l.t.vy -= uy*f;
  }
  const cx = {}, cy = {}, cc = {};
  for (const n of nodes) { cx[n.comm] = (cx[n.comm]||0)+n.x; cy[n.comm] = (cy[n.comm]||0)+n.y; cc[n.comm] = (cc[n.comm]||0)+1; }
  for (const n of nodes) {
    if (cc[n.comm] > 1) { n.vx += (cx[n.comm]/cc[n.comm] - n.x) * 0.015; n.vy += (cy[n.comm]/cc[n.comm] - n.y) * 0.015; }
    const hx = n.ax != null ? n.ax : 0, hy = n.ay != null ? n.ay : 0;
    n.vx += (hx - n.x) * (n.ax != null ? 0.02 : 0.004);
    n.vy += (hy - n.y) * (n.ax != null ? 0.02 : 0.004);
    const sp = Math.hypot(n.vx, n.vy); if (sp > 24) { n.vx = n.vx/sp*24; n.vy = n.vy/sp*24; }
    if (n.pin) { n.vx = n.vy = 0; continue; }
    n.x += n.vx*heat; n.y += n.vy*heat; n.vx *= 0.85; n.vy *= 0.85;
    // Hard boundary: no neuron may leave its cluster's disc.
    const rmax = n.ax != null ? HIVE_RADIUS : PROJECT_RADIUS;
    const ox = n.x - hx, oy = n.y - hy, od = Math.hypot(ox, oy);
    if (od > rmax) { n.x = hx + ox/od*rmax; n.y = hy + oy/od*rmax; n.vx *= 0.4; n.vy *= 0.4; }
  }
  if (view === "hive") {
    // Seat each project's hub in the centre of its own cluster, so it reads as that cluster's core
    // (the neuron the central 'you' node links to) instead of dangling on a stick in empty space.
    const gx = {}, gy = {}, gn = {};
    for (const n of nodes) {
      if (n.kind === "project" || n.kind === "core") continue;
      gx[n.group] = (gx[n.group]||0)+n.x; gy[n.group] = (gy[n.group]||0)+n.y; gn[n.group] = (gn[n.group]||0)+1;
    }
    for (const n of nodes) if (n.kind === "project" && gn[n.group]) {
      n.x = gx[n.group]/gn[n.group]; n.y = gy[n.group]/gn[n.group]; n.vx = n.vy = 0;
    }
  }
  heat *= 0.985; if (heat < 0.03) heat = 0;
}

function draw() {
  const w = cv.width = cv.clientWidth * devicePixelRatio, h = cv.height = cv.clientHeight * devicePixelRatio;
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,w,h);
  ctx.setTransform(T.k*devicePixelRatio,0,0,T.k*devicePixelRatio, T.x*devicePixelRatio, T.y*devicePixelRatio);
  const nb = neighbors(selected);
  for (const l of links) {
    if (l.rel === "semantic" && !showSemantic) continue;
    if (view === "hive" && l.rel === "cluster") continue;   // spokes are noise; grouping is spatial
    const active = selected && (l.s === selected || l.t === selected);
    // Select a neuron and everything but its own links fades away, so you read one thing at a time
    // instead of a web. Otherwise links are faint and thin so crossings don't shout.
    ctx.globalAlpha = active ? 0.95 : (selected ? 0.05 : 0.4);
    ctx.strokeStyle = active ? "rgba(150,180,255,.95)" : (edgeStyle[l.rel]?.color || "rgba(120,130,150,.5)");
    ctx.lineWidth = (l.rel === "user" ? 1.4 : active ? 1.5 : 0.7) / T.k;
    // Bow each link slightly so overlapping links read as separate strands, not one straight tangle.
    const dx = l.t.x - l.s.x, dy = l.t.y - l.s.y;
    const cxp = (l.s.x + l.t.x)/2 - dy*0.14, cyp = (l.s.y + l.t.y)/2 + dx*0.14;
    ctx.beginPath(); ctx.moveTo(l.s.x, l.s.y); ctx.quadraticCurveTo(cxp, cyp, l.t.x, l.t.y); ctx.stroke();
  }
  ctx.globalAlpha = 1;
  for (const n of nodes) {
    const r = radius(n);
    const dim = (filter && !match(n)) || (selected && n !== selected && !nb.has(n));
    ctx.globalAlpha = dim ? 0.18 : 1;
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 7);
    ctx.fillStyle = colorFor(view, n); ctx.fill();
    if (n === selected || n === linkFrom) { ctx.lineWidth = 2/T.k; ctx.strokeStyle = "#fff"; ctx.stroke(); }
    if (r*T.k > 9) {
      ctx.globalAlpha = dim ? 0.2 : 0.9; ctx.fillStyle = "#cdd3df";
      ctx.font = `${11/T.k}px -apple-system,Segoe UI,sans-serif`;
      ctx.fillText((n.label||"").slice(0,22), n.x + r + 3/T.k, n.y + 3/T.k);
    }
  }
  ctx.globalAlpha = 1;
}

// Communities of densely-connected neurons (label propagation over content links only, ignoring the
// structural hive spokes), so the layout can pull each into its own bubble.
function detectCommunities() {
  const adj = {};
  for (const n of nodes) { adj[n.id] = []; n.comm = n.id; }
  for (const l of links) {
    if (l.rel === "hub" || l.rel === "cluster") continue;
    adj[l.source].push(l.target); adj[l.target].push(l.source);
  }
  for (let iter = 0; iter < 8; iter++) {
    let changed = false;
    for (const n of nodes) {
      const nb = adj[n.id]; if (!nb.length) continue;
      const counts = {};
      for (const m of nb) { const c = byId[m].comm; counts[c] = (counts[c]||0)+1; }
      let best = n.comm, bc = -1;
      for (const c in counts) if (counts[c] > bc || (counts[c] === bc && c < best)) { bc = counts[c]; best = c; }
      if (best !== n.comm) { n.comm = best; changed = true; }
    }
    if (!changed) break;
  }
}

function radius(n) { return n.kind === "core" ? 8 : n.kind === "project" ? 6 : 2.4 + Math.min(3.6, n.degree*0.45); }
function neighbors(n) { const s = new Set(); if (!n) return s; for (const l of links) { if (l.s===n) s.add(l.t); if (l.t===n) s.add(l.s); } return s; }
function match(n) { return (n.label||"").toLowerCase().includes(filter) || (n.snippet||"").toLowerCase().includes(filter); }
function loop() { if (heat > 0) tick(); draw(); requestAnimationFrame(loop); }

function fit() {
  if (!nodes.length) return;
  const xs = nodes.map(n=>n.x), ys = nodes.map(n=>n.y);
  const minx = Math.min(...xs), maxx = Math.max(...xs), miny = Math.min(...ys), maxy = Math.max(...ys);
  const w = cv.clientWidth, h = cv.clientHeight;
  const k = Math.min(2.2, 0.85 * Math.min(w/(maxx-minx+120), h/(maxy-miny+120)));
  T.k = isFinite(k) && k > 0 ? k : 1;
  T.x = w/2 - (minx+maxx)/2*T.k; T.y = h/2 - (miny+maxy)/2*T.k;
}

function screenToWorld(px, py) { return { x: (px - T.x)/T.k, y: (py - T.y)/T.k }; }
function nodeAt(px, py) {
  const p = screenToWorld(px, py);
  let best = null, bd = 1e9;
  for (const n of nodes) { const d = Math.hypot(n.x-p.x, n.y-p.y); if (d < radius(n)+6/T.k && d < bd) { bd = d; best = n; } }
  return best;
}

async function select(n) {
  selected = n; closeEdgeMenu();
  document.querySelectorAll(".leaf.sel").forEach(e => e.classList.remove("sel"));
  const leaf = document.querySelector(`.leaf[data-id="${CSS.escape(n.id)}"]`);
  if (leaf) { leaf.classList.add("sel"); leaf.scrollIntoView({ block: "nearest" }); leaf.parentElement.classList.add("open"); }
  const d = document.getElementById("detail");
  const nb = [...neighbors(n)].length;
  let body = n.snippet || "";
  const editable = view === "project" && n.kind !== "core";
  const url = view === "project"
    ? (n.kind !== "core" ? "/api/memory/" + encodeURIComponent(n.id) + pq() : null)
    : (n.id.includes("#") ? `/api/hive/memory?project=${encodeURIComponent(n.group)}&id=${encodeURIComponent(n.id.split("#")[1])}` : null);
  if (url) {
    try { const full = await (await fetch(url)).json(); if (full && full.body) body = full.body; } catch {}
  }
  selectedBody = body;
  const long = body.length > 420;
  const shown = long ? esc(body.slice(0, 420)).trimEnd() + "…" : esc(body);
  d.innerHTML = `<span class="x" onclick="closeDetail()">✕</span>
    <span class="k">${n.kind}${view==="hive"&&n.group?" · "+n.group:""}</span>
    <h3>${esc(n.label || n.id)}</h3>
    <div class="body">${shown}</div>` +
    (long ? `<button class="more" onclick="expandBody(this)">read more</button>` : "") +
    `<div class="meta">${nb} connection(s) · degree ${n.degree}<br>${n.id}</div>` +
    (editable ? `<div class="acts"><button onclick="editMem('${n.id}')">Edit</button><button class="danger" onclick="delMem('${n.id}')">Delete</button></div>` : "");
  d.classList.add("show");
}
let selectedBody = "";
function expandBody(btn) {
  btn.parentElement.querySelector(".body").textContent = selectedBody;
  btn.remove();
}
function closeDetail() { document.getElementById("detail").classList.remove("show"); selected = null; }
function esc(s){ return (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

async function toggleLink(a, b) {
  const existing = links.find(l => l.rel==="user" && ((l.s===a&&l.t===b)||(l.s===b&&l.t===a)));
  const url = (existing ? "/api/unlink" : "/api/link") + `?source=${encodeURIComponent(a.id)}&target=${encodeURIComponent(b.id)}` + pq("&");
  await fetch(url, { method: "POST" });
  toast(existing ? "disconnected" : "connected");
  await load();
}
function toast(m) { const t = document.getElementById("toast"); t.textContent = m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 1200); }

let drag = null, panning = null, moved = false, downXY = null;
let selectedEdge = null, reconnect = null, pendingInsert = null;
cv.addEventListener("mousedown", e => {
  const n = nodeAt(e.offsetX, e.offsetY); moved = false; downXY = { x: e.offsetX, y: e.offsetY };
  if (n) drag = { n }; else panning = { x: e.offsetX - T.x, y: e.offsetY - T.y };
});
window.addEventListener("mousemove", e => {
  const r = cv.getBoundingClientRect(), px = e.clientX - r.left, py = e.clientY - r.top;
  if (drag) { moved = true; const p = screenToWorld(px, py); drag.n.x = p.x; drag.n.y = p.y; drag.n.pin = true; heat = Math.max(heat, .5); }
  else if (panning) { if (downXY && Math.hypot(px - downXY.x, py - downXY.y) > 3) moved = true; T.x = px - panning.x; T.y = py - panning.y; }
  else showTip(px, py);
});
window.addEventListener("mouseup", () => {
  if (drag && !moved) {
    const n = drag.n;
    if (reconnect) finishReconnect(n);
    else if (linkMode) { if (!linkFrom) { linkFrom = n; toast("pick a second neuron"); } else if (linkFrom !== n) { toggleLink(linkFrom, n); linkFrom = null; } }
    else select(n);
  } else if (panning && !moved && downXY) {
    if (reconnect) { reconnect = null; setHint(); toast("reconnect cancelled"); }
    else { const l = edgeAt(downXY.x, downXY.y); if (l) openEdgeMenu(l, downXY.x, downXY.y); else closeEdgeMenu(); }
  }
  drag = panning = null;
});

// --- editing the links themselves (project view) ---
function distToSeg(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1, len2 = dx*dx + dy*dy;
  let t = len2 ? ((px-x1)*dx + (py-y1)*dy) / len2 : 0; t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t*dx), py - (y1 + t*dy));
}
function edgeAt(px, py) {
  if (view !== "project") return null;
  const p = screenToWorld(px, py); let best = null, bd = 7 / T.k;
  for (const l of links) {
    if (l.rel === "semantic" && !showSemantic) continue;
    const d = distToSeg(p.x, p.y, l.s.x, l.s.y, l.t.x, l.t.y);
    if (d < bd) { bd = d; best = l; }
  }
  return best;
}
const enc = encodeURIComponent;
async function post(kind, s, t) { await fetch(`/api/${kind}?source=${enc(s)}&target=${enc(t)}` + pq("&"), { method: "POST" }); }
async function removeLink(l) { await (l.rel === "user" ? post("unlink", l.source, l.target) : post("hide", l.source, l.target)); }

function openEdgeMenu(l, px, py) {
  closeDetail(); selectedEdge = l;
  const label = (edgeStyle[l.rel] || {}).label || l.rel;
  const em = document.getElementById("edgemenu");
  em.innerHTML = `<div class="em-title">${label}</div>
    <button onclick="removeEdge()">✕ Remove this link</button>
    <button onclick="insertBetween()">＋ Insert memory in the middle</button>
    <button onclick="startReconnect()">↳ Reconnect an end…</button>`;
  em.style.left = Math.min(px, cv.clientWidth - 200) + "px";
  em.style.top = py + "px"; em.style.display = "block";
}
function closeEdgeMenu() { document.getElementById("edgemenu").style.display = "none"; selectedEdge = null; }
async function removeEdge() { const l = selectedEdge; closeEdgeMenu(); if (!l) return; await removeLink(l); toast("link removed"); await load(); }
function insertBetween() { const l = selectedEdge; closeEdgeMenu(); if (!l) return; pendingInsert = { source: l.source, target: l.target, rel: l.rel }; memForm(null); }
function startReconnect() { const l = selectedEdge; closeEdgeMenu(); if (!l) return; reconnect = { keep: l.source, drop: l.target, rel: l.rel }; setHint(); toast("click the memory to connect this end to"); }
async function finishReconnect(n) {
  const rc = reconnect; reconnect = null; setHint();
  if (!rc || n.id === rc.keep) { toast("reconnect cancelled"); return; }
  await removeLink({ rel: rc.rel, source: rc.keep, target: rc.drop });
  await post("link", rc.keep, n.id);
  toast("reconnected"); await load();
}
function setHint() { document.getElementById("hint").textContent = reconnect ? "reconnect: click the memory to connect this end to" : linkMode ? "link mode: click two neurons to connect or disconnect" : "drag to pan · scroll to zoom · drag a neuron · click a link to edit it · keys: esc, arrows, +/−, F fit, H/P view"; }
cv.addEventListener("dblclick", e => { const n = nodeAt(e.offsetX, e.offsetY); if (n) n.pin = false; });
cv.addEventListener("wheel", e => {
  e.preventDefault();
  const s = e.deltaY < 0 ? 1.12 : 0.89, wx = (e.offsetX - T.x)/T.k, wy = (e.offsetY - T.y)/T.k;
  T.k = Math.max(0.15, Math.min(5, T.k*s)); T.x = e.offsetX - wx*T.k; T.y = e.offsetY - wy*T.k;
}, { passive: false });

function zoomBy(s) {
  const cx = cv.clientWidth/2, cy = cv.clientHeight/2, wx = (cx - T.x)/T.k, wy = (cy - T.y)/T.k;
  T.k = Math.max(0.15, Math.min(5, T.k*s)); T.x = cx - wx*T.k; T.y = cy - wy*T.k;
}
// Keyboard: Esc backs out (modal -> link mode -> selection -> filter), arrows pan, +/- zoom,
// F recenters, H/P switch views. Ignored while typing in a field.
window.addEventListener("keydown", e => {
  if (/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)) return;
  const step = 70;
  switch (e.key) {
    case "Escape":
      if (document.getElementById("modal").classList.contains("show")) closeModal();
      else if (linkMode || reconnect) { linkMode = false; linkFrom = null; reconnect = null; document.getElementById("linkmode").classList.remove("on"); closeEdgeMenu(); setHint(); }
      else if (selected) closeDetail();
      else { document.getElementById("search").value = ""; filter = ""; }
      break;
    case "ArrowLeft": T.x += step; break;
    case "ArrowRight": T.x -= step; break;
    case "ArrowUp": T.y += step; break;
    case "ArrowDown": T.y -= step; break;
    case "+": case "=": zoomBy(1.15); break;
    case "-": case "_": zoomBy(0.87); break;
    case "f": case "F": case "0": fit(); break;
    case "h": case "H": setView("hive"); break;
    case "p": case "P": setView("project"); break;
    default: return;
  }
  e.preventDefault();
});

function showTip(px, py) {
  // The tip lives inside .stage, so it must be placed with stage-relative (canvas) coords, not the
  // viewport clientX/Y — otherwise it lands offset by the sidebar width and header height.
  const n = nodeAt(px, py), tip = document.getElementById("tip");
  if (n) { tip.style.display = "block"; tip.style.left = (px+14)+"px"; tip.style.top = (py+14)+"px";
    tip.innerHTML = `<b>${esc(n.label||n.id)}</b><br>${esc((n.snippet||"").slice(0,120))}`; }
  else tip.style.display = "none";
}

document.getElementById("search").addEventListener("input", e => { filter = e.target.value.toLowerCase(); });
document.getElementById("linkmode").onclick = e => { linkMode = !linkMode; linkFrom = null; reconnect = null; closeEdgeMenu(); e.target.classList.toggle("on", linkMode); setHint(); };
document.getElementById("refit").onclick = fit;
document.getElementById("sem").onclick = e => { showSemantic = !showSemantic; e.target.classList.toggle("on", showSemantic); buildLegend(); };
function setView(v) {
  view = v; selected = null; closeDetail(); closeEdgeMenu(); linkFrom = null; reconnect = null; setHint();
  for (const t of ["project", "hive", "channel"]) document.getElementById("tab-" + t).classList.toggle("on", v === t);
  const graph = v === "project" || v === "hive";
  document.getElementById("channel").classList.toggle("show", v === "channel");
  for (const id of ["proj", "add", "sem", "refit"]) document.getElementById(id).style.display = graph ? "" : "none";
  document.getElementById("linkmode").style.display = v === "project" ? "" : "none";
  document.getElementById("legend").style.display = graph ? "" : "none";
  document.getElementById("hint").style.display = graph ? "" : "none";
  if (v === "channel") loadChannel(); else load();
}
async function loadChannel() {
  const el = document.getElementById("channel");
  let threads = [];
  try { threads = (await (await fetch("/api/channel")).json()).threads || []; } catch {}
  if (!threads.length) {
    el.innerHTML = `<div class="empty">No agent messages yet.<br><br>This is where your agents talk to each other — one project's agent can ask another
      "how's the training going?" and get a reply, all with you able to read along. Agents use mem_ask / mem_inbox / mem_reply.</div>`;

  el.innerHTML = `<div class="wrap"><div class="ch-head">${threads.length} conversation(s) between your agents — newest first.</div>` +

        <div class="bubble">${esc(m.body)}</div>

}

const KINDS = ["fact", "decision", "entity", "session", "skill"];
function memForm(e) {
  const isEdit = !!e;
  modal(`<h3>${isEdit ? "Edit memory" : "Add memory"}</h3>
    <label>Kind</label>
    <select id="f-kind" ${isEdit ? "disabled" : ""}>${KINDS.map(k => `<option ${e && e.kind === k ? "selected" : ""}>${k}</option>`).join("")}</select>

async function saveMem(id) {
  const kind = document.getElementById("f-kind").value;
  const topic = document.getElementById("f-topic").value.trim();
  const body = document.getElementById("f-body").value.trim();
  const tags = document.getElementById("f-tags").value.split(",").map(s => s.trim()).filter(Boolean);
  if (!body) { toast("a memory needs a body"); return; }
  const payload = JSON.stringify(id ? { topic, body, tags } : { kind, topic, body, tags });
  const url = id ? `/api/memory/${encodeURIComponent(id)}/edit${pq()}` : `/api/memory${pq()}`;
  const r = await (await fetch(url, { method: "POST", body: payload })).json();
  if (r.ok === false || r.error) { toast(r.error || "could not save"); return; }
  // Inserting a memory in the middle of a link: connect it to both ends, drop the original.
  if (!id && pendingInsert && r.id) {
    await post("link", pendingInsert.source, r.id);
    await post("link", pendingInsert.target, r.id);
    await removeLink({ rel: pendingInsert.rel, source: pendingInsert.source, target: pendingInsert.target });
    pendingInsert = null;
  }
  closeModal(); toast(id ? "saved" : "added"); await load();
}
async function editMem(id) {
  const m = await (await fetch(`/api/memory/${encodeURIComponent(id)}${pq()}`)).json();
  memForm({ id, kind: m.type, topic: m.topic || "", body: m.body || "", tags: m.tags || [] });
}
async function delMem(id) {
  if (!confirm("Delete this memory permanently?")) return;
  await fetch(`/api/memory/${encodeURIComponent(id)}/delete${pq()}`, { method: "POST" });
  closeModal(); closeDetail(); toast("deleted"); await load();
}

    return `<div class="row-item"><span>${esc(p.name)} ${badge}</span>
        <span class="dim">${esc(p.root)}</span>

      <div id="sf-${i}" class="sharebox"></div>`;
  }).join("");
  modal(`<h3>Projects</h3>
    <p class="dim">Every project is local and private by default. Share one to a gateway space to sync it across your machines or with teammates — the rest stay local.</p>
    ${rows || "<p class='dim'>None yet — add one below.</p>"}
    <hr><h3>Add a project</h3><p class="dim">Browse to a folder. 🧠 already has a Marrow brain; 📁 will get one.</p>

function shareForm(i) {

      <input id="tok-${i}" type="password" placeholder="API key / token (optional)">

async function doShare(i) {
  const p = projCache[i];

  toast("removed"); await loadProjects(); manageProjects();
}
document.getElementById("add").onclick = () => memForm(null);
document.getElementById("manage").onclick = manageProjects;

function helpModal() {
  const kinds = [
    ["fact", "Something true about the project — \"the rate limit is 100 req/min\"."],
    ["decision", "A choice made, and why — \"we use JWT for auth\". Marrow keeps one active decision per topic."],
    ["entity", "A person, service, or thing — a teammate, an external API, a database."],
    ["session", "A checkpoint or summary of a work session, so the next one starts warm."],
    ["skill", "A reusable how-to the agent learned — a procedure worth remembering."],
  ];
  const terms = [
    ["neuron", "One memory, shown as a dot. Bigger = more connections."],
    ["topic", "A short label that groups related memories."],
    ["tag", "A keyword for cross-cutting themes; tags bridge topics."],
    ["connection", "How two memories relate: shared <b>topic</b>, shared <b>tag</b>, <b>related meaning</b> (from embeddings), or a link <b>you drew</b>. Real, never random."],
    ["related meaning", "Links inferred from AI embeddings — memories that mean similar things. Needs semantic search on (✧ Meaning)."],
    ["project", "One codebase's brain. Switch between them with the dropdown up top."],
    ["hive", "All your registered projects federated into one brain. The Hive tab shows it."],
    ["core (you)", "Shared memory about you — the gold neuron at the center of the hive."],
  ];
  const li = arr => arr.map(([t, d]) => `<div style="margin:7px 0"><b style="color:var(--text)">${t}</b> — <span class="dim">${d}</span></div>`).join("");
  modal(`<h3>What is Marrow?</h3>
    <p class="dim">Marrow is a shared memory for your AI coding agents. Every dot here is one thing an agent
    remembered about your project; lines connect memories that relate. A new agent session starts already
    knowing all of it, so it doesn't re-read your codebase or repeat decisions.</p>
    <hr><h3>The five kinds of memory</h3>${li(kinds)}
    <hr><h3>Terms on this graph</h3>${li(terms)}
    <hr><h3>Your data is yours</h3>
    <p class="dim">Your memories are plain markdown files on <b>your own computer</b>, under <code>.marrow/</code>
    in each project. Nothing is uploaded or collected — no account, no telemetry. You can read, edit, or delete
    them by hand or right here. (Only if you choose to run the optional shared server does data go anywhere, and
    then only to the server <b>you</b> control.)</p>
    <div class="modal-actions"><button class="on" onclick="closeModal()">Got it</button></div>`);
}
document.getElementById("help").onclick = helpModal;

loadProjects().then(load); loop();
</script>
</body>
</html>
