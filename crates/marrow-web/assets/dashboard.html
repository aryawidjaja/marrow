<style>
  :root {
    --bg: #0a0c10; --panel: #11151b; --panel2: #181d25; --line: #262c36;
    --text: #f1f3f5; --muted: #929baa; --accent: #e8c84f; --gold: #e8c84f;
    --ease-out: cubic-bezier(.23,1,.32,1); --ease-in-out: cubic-bezier(.77,0,.175,1);
    --header-h: 56px; --sidebar-w: clamp(276px, 20vw, 316px);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--text); overflow: hidden;
    font: 13px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { height: var(--header-h); display: flex; align-items: center; gap: 12px; padding: 0 14px;
    border-bottom: 1px solid var(--line); background: rgba(10,12,16,.92); backdrop-filter: blur(18px);
    position: relative; z-index: 15; }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; font-weight: 600; display: flex; align-items: center; }
  .brand-wm { height: 17px; width: 84px; display: block; }
  .spacer { flex: 1; }
  button, .seg { background: var(--panel); color: var(--text); border: 1px solid var(--line);
    padding: 7px 11px; border-radius: 7px; cursor: pointer; font: 600 12px/1.2 inherit;
    transition: color 140ms ease, background-color 140ms ease, border-color 140ms ease, transform 120ms var(--ease-out); }
  button:active { transform: scale(.97); }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
    outline: 2px solid var(--accent); outline-offset: 2px; }
  button.on { background: var(--accent); border-color: var(--accent); color: #0d0f14; font-weight: 600; }
  /* Segmented control: one recessed track, the active tab raised out of it. */
  .scope { display: flex; align-items: center; gap: 7px; }
  .scope-label { color: var(--muted); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .seg { display: inline-flex; gap: 2px; padding: 3px; background: var(--panel2);
    border: 1px solid var(--line); border-radius: 8px; overflow: visible; }
  .seg button { border: 0; background: transparent; color: var(--muted); border-radius: 6px;
    padding: 5px 13px; font-size: 12px; font-weight: 600; letter-spacing: .2px; cursor: pointer;
    transition: background .16s ease, color .16s ease; }
  .seg button:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .seg button.on { background: #f0f1f2; color: #0a0c10; }
  .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button svg.ico { width: 14px; height: 14px; flex: 0 0 auto; vertical-align: -2px; }
  .dock button[hidden] { display: none; }
  #proj[hidden] { display: none; }
  input[type=search], select, .modal-card input, .modal-card textarea, .modal-card select {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    padding: 6px 10px; border-radius: 7px; font-size: 12px; }
  .nav-channel { display: inline-flex; align-items: center; gap: 7px; background: transparent; border-color: transparent; color: var(--muted); }
  .nav-channel.on { background: rgba(232,200,79,.12); border-color: rgba(232,200,79,.28); color: var(--accent); }
  .nav-channel svg { width: 15px; height: 15px; }
  #sidebar-toggle { display: none; width: 34px; height: 34px; padding: 0; align-items: center;
    justify-content: center; flex: 0 0 auto; }
  #sidebar-toggle svg { width: 16px; height: 16px; }
  #sidebar-toggle[hidden] { display: none !important; }
  .searchbox { position: relative; margin-left: 2px; }
  .searchbox svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--muted); pointer-events: none; }
  input[type=search] { width: min(25vw, 280px); padding-left: 31px; }
  select#proj { max-width: 190px; cursor: pointer; }
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none;
    align-items: center; justify-content: center; z-index: 20; }
  #modal.show { display: flex; }
  .modal-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; width: 480px; max-width: 92vw; max-height: 86vh; overflow: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .modal-card h3 { margin: 0 0 12px; font-size: 15px; }
  .modal-card label { display: block; color: var(--muted); font-size: 11px; margin: 10px 0 4px; }
  .modal-card input, .modal-card textarea, .modal-card select { width: 100%; }
  .modal-card textarea { resize: vertical; font-family: inherit; line-height: 1.5; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .modal-card hr { border: 0; border-top: 1px solid var(--line); margin: 18px 0; }
  .modal-card p { margin: 8px 0; line-height: 1.55; }
  .modal-card .dim { color: var(--muted); }
  .modal-card code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .row-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .row-item .dim { color: var(--muted); font-size: 11px; flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .brow { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 5px 8px; border-radius: 6px; cursor: pointer; }
  .brow:hover { background: var(--panel2); }
  .brow .nav { flex: 1; cursor: pointer; }
  .brow small { color: var(--accent); }
  .fico { width: 14px; height: 14px; vertical-align: -3px; margin-right: 6px; color: var(--muted); }
  .fico.on { color: var(--accent); }
  #detail .sec { margin: 14px 0 6px; font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); font-weight: 600; }
  /* A warning has to look like a warning, and must not be mistaken for "selected". */
  #detail .warn { display: flex; flex-direction: column; gap: 3px; margin: 10px 0;
    padding: 9px 10px; border-radius: 8px; font-size: 11px; line-height: 1.45;
    background: rgba(255,138,61,.12); border: 1px solid rgba(255,138,61,.38); color: #ffd2ae; }
  #detail .warn b { color: #ff8a3d; }
  #detail .warn span { color: var(--muted); }
  #detail .warn.moved { background: rgba(143,176,245,.1); border-color: rgba(143,176,245,.35); color: #cfe0ff; }
  #detail .warn.moved b { color: #8fb0f5; }
  #detail .review-guide, #detail .trace-guide { margin: 10px 0 12px; padding: 10px 11px;
    border-radius: 8px; background: rgba(255,176,87,.08); border: 1px solid rgba(255,176,87,.24); }
  #detail .review-guide .eyebrow, #detail .trace-guide .eyebrow { display: block; margin-bottom: 4px;
    color: #ffb057; font-size: 9px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }
  #detail .review-guide strong, #detail .trace-guide strong { display: block; color: var(--text); font-size: 12px; }
  #detail .review-guide p, #detail .trace-guide p { margin: 4px 0 0; color: var(--muted); font-size: 10.5px; line-height: 1.5; }
  #detail .review-guide .next { margin-top: 8px; padding-top: 7px; border-top: 1px solid rgba(255,176,87,.18); }
  #detail .review-guide .next b { color: var(--accent); }
  #detail .review-guide button { margin-top: 8px; padding: 5px 8px; font-size: 10px; }
  #detail .trace-guide { background: rgba(232,200,79,.07); border-color: rgba(232,200,79,.2); }
  #detail .trace-guide .eyebrow { color: var(--accent); }
  #detail .trace-route { margin-top: 6px; color: var(--text); font-size: 10px; line-height: 1.45; overflow-wrap: anywhere; }
  #detail .trace-hop { display: block; margin: 3px 0; color: var(--accent); font-size: 9px; }
  /* Lineage reads top-down like a commit log: newest first, "now" highlighted. */
  #detail .lin-row { display: flex; gap: 8px; align-items: baseline; padding: 4px 6px; margin: 0 -6px;
    border-radius: 5px; font-size: 11px; cursor: pointer; transition: background .14s ease; }
  #detail .lin-row:hover { background: var(--panel2); }
  #detail .lin-row.here { cursor: default; background: rgba(255,222,89,.1); }
  #detail .lin-row.here:hover { background: rgba(255,222,89,.1); }
  #detail .lin-verb { color: var(--muted); font-size: 10px; white-space: nowrap; min-width: 62px; }
  #detail .lin-row.here .lin-verb { color: var(--accent); font-weight: 600; }
  #detail .lin-topic { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #detail .acts { display: flex; gap: 8px; margin-top: 12px; }
  #detail .acts.col { flex-direction: column; gap: 6px; }
  #detail .acts.col button { width: 100%; text-align: left; padding: 7px 10px; }
  /* The two neurons a link joins, drawn as the link itself. */
  #detail .pair { margin: 12px 0 10px; }
  #detail .pair-row { display: flex; align-items: center; gap: 8px; font-size: 12px;
    color: var(--text); line-height: 1.4; }
  #detail .pair-row .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  #detail .pair-wire { width: 2px; height: 16px; margin: 3px 0 3px 3.5px; border-radius: 1px;
    background: var(--accent); opacity: .75; }
  #detail .acts button { font-size: 11px; padding: 4px 10px; }
  .danger { color: #ff6b6b; }
  .pill { font-size: 10px; padding: 1px 7px; border-radius: 9px; background: var(--panel2);
    color: var(--muted); border: 1px solid var(--line); vertical-align: middle; }
  .pill.on { background: rgba(255,222,89,.14); color: var(--accent); border-color: transparent; }
  .sharebox:empty { display: none; }
  .sharebox { padding: 2px 0 8px; }
  .sharegrid { display: flex; flex-direction: column; gap: 6px; }
  .sharegrid input { background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 6px 8px; font-size: 12px; }
  .sharebtns { display: flex; gap: 8px; }
  main { display: grid; grid-template-columns: var(--sidebar-w) minmax(0, 1fr); height: calc(100dvh - var(--header-h)); }
  main.channel-view { grid-template-columns: 1fr; }
  main.channel-view > .side { display: none; }
  /* Navigation and map controls share one stable rail, but scroll independently. */
  aside.side { display: flex; flex-direction: column; min-width: 0; overflow: hidden; padding: 0; }
  .side-section { display: flex; flex-direction: column; min-height: 0; }
  .side-projects { flex: 1 1 42%; min-height: 156px; }
  .side-inspector { flex: 1 1 58%; min-height: 210px; }
  .side-section.collapsed { flex: 0 0 auto; min-height: 0; }
  .side-section-head { width: 100%; min-height: 38px; display: flex; align-items: center; gap: 7px;
    padding: 9px 12px; border: 0; border-radius: 0; background: transparent; color: var(--text);
    text-align: left; font-size: 11px; letter-spacing: .02em; }
  .side-section-head:hover { background: rgba(255,255,255,.035); }
  .side-section-head:focus-visible { outline-offset: -2px; }
  .side-section-head .side-title { flex: 1; }
  .side-section-head .side-meta { color: var(--muted); font-size: 9.5px; font-weight: 500;
    letter-spacing: 0; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .side-section-head .side-chevron { width: 13px; height: 13px; color: var(--muted);
    transition: transform .16s var(--ease-out); }
  .side-section.collapsed .side-chevron { transform: rotate(-90deg); }
  .side-section-body { flex: 1; min-height: 0; overflow: auto; scrollbar-width: thin; }
  .side-section.collapsed .side-section-body { display: none; }
  .side-gap { flex: 0 0 10px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    background: var(--bg); }
  .side-act { padding: 2px 8px 8px; }
  .side-act button { width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 7px 10px; font-size: 12px; font-weight: 600; }
  #tree { padding: 0 0 9px; }
  #side-backdrop { display: none; }
  /* Dock = tools that act on the canvas, so they live on the canvas. */
  /* Time. The ledger is append-only, so the brain's whole history is replayable. */
  .tl { position: absolute; left: 50%; bottom: 76px; transform: translateX(-50%); z-index: 20;
    display: flex; align-items: center; gap: 12px; width: min(620px, calc(100% - 40px));
    padding: 9px 14px; background: rgba(21,25,34,.93); backdrop-filter: blur(12px);
    border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  .tl[hidden] { display: none; }
  /* The global button rule (padding + border) was fighting this; zero both or the circle inflates. */
  .tl-play { flex: 0 0 auto; width: 32px; height: 32px; padding: 0; border: 0; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent); color: #0d0f14; cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease; }
  .tl-play:hover { transform: scale(1.06); box-shadow: 0 0 0 4px rgba(255,222,89,.16); }
  .tl-play:active { transform: scale(.96); }
  .tl-play:focus { outline: none; }                       /* kill the browser's blue ring */
  .tl-play:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .tl-play svg { width: 15px; height: 15px; display: block; }
  .tl input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 3px;
    border-radius: 2px; background: linear-gradient(90deg, var(--accent) var(--p, 100%), var(--line) var(--p, 100%));
    cursor: pointer; }
  .tl input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px;
    border-radius: 50%; background: #fff; border: 2px solid var(--accent); cursor: grab; }
  .tl-meta { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; line-height: 1.25; }
  #tl-when { font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; }
  #tl-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .tl-audit { flex: 0 0 auto; font-size: 10px; color: var(--muted); white-space: nowrap;
    padding-left: 12px; border-left: 1px solid var(--line); }
  .tl-audit b { color: #57cf9c; }
  .tl-audit.broken b { color: #ff6b6b; }
  .dock { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 20;
    display: flex; align-items: center; gap: 4px; padding: 6px;
    background: rgba(21,25,34,.9); backdrop-filter: blur(12px);
    border: 1px solid var(--line); border-radius: 13px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  .dock button { border: 0; background: transparent; color: var(--muted); border-radius: 8px;
    padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .15s ease, color .15s ease; }
  .dock button:hover { background: var(--panel2); color: var(--text); }
  .dock button.on { background: var(--accent); color: #0d0f14; }
  .dock button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .dock .sep { width: 1px; height: 18px; background: var(--line); margin: 0 3px; }
  .dock[hidden] { display: none; }
  /* Link mode: say exactly what to do next, and show the wire following the cursor. */
  .linkbar { position: absolute; left: 50%; bottom: 78px; transform: translateX(-50%); z-index: 20;
    display: none; align-items: center; gap: 9px; padding: 9px 14px; font-size: 12px;
    color: var(--text); background: rgba(21,25,34,.94); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,222,89,.4); border-radius: 10px;
    box-shadow: 0 8px 26px rgba(0,0,0,.5); white-space: nowrap; }
  .linkbar.show { display: flex; }
  .linkbar .step { display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #0d0f14;
    font-weight: 700; font-size: 10px; flex: 0 0 auto; }
  .linkbar b { color: var(--accent); font-weight: 600; }
  .linkbar kbd { background: var(--panel2); border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 5px; font-size: 10px; color: var(--muted); }
  .stage.linking canvas { cursor: crosshair; }
  aside { border-right: 1px solid var(--line); background: var(--panel); overflow: auto;
    padding: 10px 0; scrollbar-width: thin; }
  /* File-tree: folders (project / area) nest down to the memories inside them. */
  .tnode { display: flex; align-items: center; gap: 6px; margin: 0 6px; padding: 4px 8px;
    border-radius: 6px; cursor: pointer; font-size: 12px; line-height: 1.4; user-select: none;
    transition: background .15s ease, color .15s ease; }
  .tnode:hover { background: var(--panel2); }
  .tnode:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .tnode .tw { width: 12px; height: 12px; flex: 0 0 auto; color: var(--muted);
    transition: transform .16s ease; }
  .tnode.open > .tw { transform: rotate(90deg); }
  .tnode .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tnode .count { color: var(--muted); font-size: 10.5px; font-variant-numeric: tabular-nums; }
  .tnode.folder { font-weight: 600; color: var(--text); }
  .tnode.leaf { color: var(--muted); font-weight: 400; }
  .tnode.leaf:hover { color: var(--text); }
  .tnode.leaf.sel { background: rgba(255,222,89,.16); color: var(--text); }
  .tnode .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .tnode .pad { width: 12px; flex: 0 0 auto; }
  /* Indent guide, so nesting is legible at a glance. */
  .tkids { display: none; margin-left: 17px; border-left: 1px solid var(--line); }
  .tkids.open { display: block; }
  .tempty { color: var(--muted); font-size: 11px; padding: 10px 16px; }
  .stage { position: relative; min-width: 0; min-height: 0; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; touch-action: none; }
  .first-run { position: absolute; inset: 0; z-index: 11; display: none; place-items: center;
    padding: clamp(24px, 6vw, 72px); background: radial-gradient(circle at 50% 42%, rgba(232,200,79,.055), transparent 34%); }
  .first-run.show { display: grid; }
  .first-run-card { width: min(560px, 100%); padding: 30px 32px 34px; border: 1px solid var(--line);
    border-radius: 14px; background: rgba(17,21,27,.94); box-shadow: 0 24px 80px rgba(0,0,0,.32); }
  .first-run-mark { width: 36px; height: 36px; display: grid; place-items: center; margin-bottom: 20px;
    border-radius: 10px; background: rgba(232,200,79,.11); color: var(--accent); }
  .first-run-mark svg { width: 19px; height: 19px; }
  .first-run h2 { margin: 0 0 8px; font-size: clamp(22px, 3vw, 28px); line-height: 1.12;
    letter-spacing: -.035em; text-wrap: balance; }

<script>
const palette = ["#ffde59","#ffb057","#ff8a6b","#f2739f","#c78ef0","#8fb0f5","#5fc9d6","#57cf9c","#b5d35c","#e8b53c"];
// Edge types are real relationships, each its own colour so the graph is legible.
const edgeStyle = {
  ref:      { color: "rgba(255,138,107,0.62)", label: "explicit link" },
  topic:    { color: "rgba(143,176,245,0.32)", label: "shared topic" },
  tag:      { color: "rgba(87,207,156,0.32)",  label: "shared tag" },
  semantic: { color: "rgba(199,142,240,0.45)", label: "related meaning" },
  user:     { color: "rgba(255,222,89,0.70)",  label: "you linked" },
  hub:      { color: "rgba(255,222,89,0.32)",  label: "core ↔ project" },
  cluster:  { color: "rgba(120,130,150,0.28)", label: "project → area" },
  area:     { color: "rgba(140,150,170,0.22)", label: "in area" },
};
const colorMap = {};
// Zoomed out you need to tell PROJECTS apart; zoomed in, AREAS. Same neurons, different question.
function groupKey(n) { return (unified && view === "project") ? (n.area || "") : n.group; }
function colorFor(v, node) {
  if (node.kind === "core") return "#ffde59";
  if (node.kind === "project") return "#8b93a4";
  const g = groupKey(node);
  if (!g) return "#6b7280";                             // unfiled: deliberately drab
  if (!(g in colorMap)) colorMap[g] = palette[Object.keys(colorMap).length % palette.length];
  return colorMap[g];
}
// Where you were is part of the state: a refresh should not throw you back to the start.
const saved = (() => { try { return JSON.parse(localStorage.getItem("marrow.view") || "{}"); } catch { return {}; } })();
let view = ["project", "hive", "channel"].includes(saved.view) ? saved.view : "project";
let raw = { nodes: [], links: [] }, nodes = [], links = [], byId = {};
let filter = "", selected = null, linkMode = false, linkFrom = null, heat = 1;
let edgeFilter = null;   // isolate one connection type from the legend; null shows them all
let byFilter = null;     // isolate one agent's memories; null shows every author
let pathFrom = null, pathNodeIds = new Set(), pathLinkKeys = new Set();
let pathSummary = null, activeReview = null;
let project = typeof saved.project === "string" ? saved.project : "", projects = [];
const pq = (lead) => project ? (lead || "?") + "project=" + encodeURIComponent(project) : "";
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let mouseWorld = null;
let T = { k: 1, x: 0, y: 0 };

// Each half of the sidebar can yield space to the other. Keep that preference between visits,
// while the mobile rail remains a temporary drawer that never steals canvas space.
const SIDE_STATE_KEY = "marrow.sidebar.sections";
function setSideSection(name, open, persist = true) {
  const section = document.querySelector(`[data-side-section="${name}"]`);
  const toggle = document.querySelector(`[data-side-toggle="${name}"]`);
  if (!section || !toggle) return;
  section.classList.toggle("collapsed", !open);
  toggle.setAttribute("aria-expanded", String(open));
  if (persist) {

async function load(opts = {}) {
  unified = view === "hive";
  let data;
  try {
    const response = await fetch(unified ? "/api/hive" : "/api/graph" + pq());
    data = await response.json();
    if (!response.ok || !Array.isArray(data.nodes)) throw new Error(data.error || "could not load this brain");
  } catch (error) {
    data = { nodes: [], links: [], review: [], error: error.message || "could not load this brain" };
  }
  raw = data;
  // A LIVE refresh must not throw the layout away. Every neuron you already had keeps its exact
  // position; only newcomers get placed. Otherwise the graph explodes each time an agent writes.
  const prev = opts.keep ? byId : null;
  const prevLinks = prev ? new Set(links.map(linkKey)) : null;
  if (!prev) for (const k in colorMap) delete colorMap[k];
  byId = {};
  nodes = raw.nodes.map(n => {
    const was = prev && prev[n.id];
    return was
      ? { ...n, x: was.x, y: was.y, vx: was.vx, vy: was.vy, pin: was.pin, placed: true }
      : { ...n, x: (Math.random()-.5)*600, y: (Math.random()-.5)*600, vx: 0, vy: 0, isNew: !!prev };
  });
  nodes.forEach(n => byId[n.id] = n);
  links = raw.links.filter(l => byId[l.source] && byId[l.target]).map(l => ({ ...l, s: byId[l.source], t: byId[l.target] }));
  assignAnchors(!!prev);
  detectCommunities();

  if (prev) {
    // Real events, real motion: every genuinely new connection fires a signal down the wire, and
    // every new memory flares as it arrives.
    for (const l of links) if (!prevLinks.has(linkKey(l))) fire(l);
    for (const n of nodes) if (n.isNew) flash(n);
    heat = Math.max(heat, 0.3);   // settle the newcomers without shaking everything else loose
  } else {
    heat = 1;
  }

  // in the background and annotates the already-usable view when it finishes.
  staleBy = {};
  buildTree(); buildLegend();
  await renderFirstRun();
  if (!prev) flyToView(0);
  invalidate();
  loadStale().then(() => { buildLegend(); if (selected) select(selected); invalidate(); });
}

const bareId = n => n.id.includes("#") ? n.id.split("#")[1] : n.id;

// ---------- camera ----------
let cam = null;
function frameOf(list, pad = 110) {

  const w = cv.clientWidth, h = cv.clientHeight;

  T.k = cam.from.k + (cam.to.k - cam.from.k) * e;
  T.x = cam.from.x + (cam.to.x - cam.from.x) * e;
  T.y = cam.from.y + (cam.to.y - cam.from.y) * e;

// In hive view, give each project its own region on a ring around the core so clusters separate
// instead of piling on top of each other. Nodes start near their anchor and a gentle force holds
// them there while links still pull related neurons together.
// Both views cluster on `group`: in the hive that's the project, in a project it's the feature
// AREA. Each group gets its own region on a ring, and its neurons are held inside it. The structure
// is real (the agent filed each memory into an area), so the layout can show it instead of guessing.
function assignAnchors(keep) {
  // Every group gets a home, including "core" (the shared core store's own memories), which sits at
  // the origin rather than on the ring. A group with no anchor yields NaN coordinates.
  const groups = [...new Set(nodes.map(n => n.group))];
  const ringGroups = groups.filter(g => g !== "core");
  const isHub = n => n.kind === "project" || n.kind === "area" || n.kind === "core";

  // How many memories in each group, and in each group's area.
  const gCount = {}, gaCount = {};
  for (const n of nodes) {
    if (n.group === "core" || isHub(n)) continue;
    gCount[n.group] = (gCount[n.group] || 0) + 1;
    const k = n.group + "|" + (n.area || "");
    gaCount[k] = (gaCount[k] || 0) + 1;
  }

  if (!hiveScene()) {
    // Lone project, no hive to nest inside: the groups ARE the areas. One ring, one pocket each.
    const R = groupRingRadius(ringGroups.length);
    const ang = {};
    ringGroups.forEach((g, i) => ang[g] = (i / Math.max(1, ringGroups.length)) * Math.PI * 2);
    for (const n of nodes) {
      const a = ang[n.group];
      n.ax = a === undefined ? 0 : Math.cos(a) * R;
      n.ay = a === undefined ? 0 : Math.sin(a) * R;
      n.rmax = groupRadius(gCount[n.group] || 1);
      if (!keep || !n.placed) { n.x = n.ax + (Math.random() - .5) * 90; n.y = n.ay + (Math.random() - .5) * 90; n.placed = true; }
    }
    return;
  }

  // Hive nests: projects on an outer ring, and inside each, its AREAS get pockets on an inner ring.
  // Both radii are DERIVED from the pockets they must hold — for n pockets of radius r, the ring
  // needs r / sin(pi/n) — so a ring can never be too small for its contents.
  const info = {};
  for (const g of groups) {
    const areas = [...new Set(nodes.filter(n => n.group === g && !isHub(n)).map(n => n.area || ""))].sort();
    const rOf = a => pocketRadius(gaCount[g + "|" + a] || 1);
    const biggest = Math.max(...areas.map(rOf), 44);
    // ring radius so adjacent pockets clear each other
    const inner = areas.length <= 1 ? 0 : (biggest / Math.sin(Math.PI / areas.length)) * 1.18;
    const pockets = {};
    areas.forEach((a, i) => {
      const t = (i / Math.max(1, areas.length)) * Math.PI * 2;
      pockets[a] = { dx: Math.cos(t) * inner, dy: Math.sin(t) * inner, r: rOf(a) };
    });
    info[g] = { pockets, span: inner + biggest };
  }
  const widest = Math.max(...ringGroups.map(g => info[g].span), 120);
  const R = ringGroups.length <= 1 ? 0
    : Math.max(600, (widest / Math.sin(Math.PI / Math.max(2, ringGroups.length))) * 1.25);
  const ang = {};
  ringGroups.forEach((g, i) => ang[g] = (i / Math.max(1, ringGroups.length)) * Math.PI * 2);

  for (const n of nodes) {
    if (n.kind === "core") { n.ax = 0; n.ay = 0; n.rmax = 90; }
    else {
      const a = ang[n.group];                       // core-store memories orbit the origin
      const gx = a === undefined ? 0 : Math.cos(a) * R, gy = a === undefined ? 0 : Math.sin(a) * R;
      if (n.kind === "project") {              // the project hub sits at its own centre
        n.ax = gx; n.ay = gy; n.rmax = info[n.group].span + 40;
      } else {
        const pk = info[n.group].pockets[n.area || ""];
        n.ax = gx + (pk ? pk.dx : 0);
        n.ay = gy + (pk ? pk.dy : 0);
        n.rmax = pk ? pk.r : 60;
      }
    }
    if (!keep || !n.placed) { n.x = n.ax + (Math.random() - .5) * 70; n.y = n.ay + (Math.random() - .5) * 70; n.placed = true; }
  }
}
// Room an area needs for n memories, and how far out to place a ring of groups.
function pocketRadius(n) { return Math.max(40, Math.min(150, 20 * Math.sqrt(n) + 24)); }
function groupRadius(n) { return Math.max(70, Math.min(300, 26 * Math.sqrt(n) + 34)); }

const REVIEW_LABELS = {

  if (!scopedMemories.length) { t.innerHTML = `<div class="tempty">No memories yet.</div>`; return; }

  if (view === "hive") {
    // project > area > memory
    const tree = {};
    for (const n of memories) {
      const p = n.group, a = n.area || "";
      ((tree[p] = tree[p] || {})[a] = tree[p][a] || []).push(n);
    }
    for (const proj of Object.keys(tree).sort()) {
      const areas = tree[proj];
      const total = Object.values(areas).reduce((s, m) => s + m.length, 0);
      const row = folderRow(proj, total, colorFor(view, { group: proj, kind: "x" }));
      const kids = el("div", "tkids");
      for (const a of sortAreas(Object.keys(areas))) {
        const ms = areas[a];
        const arow = folderRow(areaName(a), ms.length, null);
        const akids = el("div", "tkids");
        sortByLabel(ms).forEach(m => akids.appendChild(leafRow(m)));
        twist(arow, akids);
        kids.append(arow, akids);
      }
      twist(row, kids);
      t.append(row, kids);
    }
  } else {
    // area > memory (only the project we're framed on)
    const byArea = {};
    for (const n of memories) {
      if (!inFocus(n) || n.kind === "core") continue;
      const a = unified ? (n.area || "") : (n.group || "");
      (byArea[a] = byArea[a] || []).push(n);
    }
    for (const a of sortAreas(Object.keys(byArea))) {
      const ms = byArea[a];
      const row = folderRow(areaName(a), ms.length, colorFor(view, { group: a, kind: "x" }));
      const kids = el("div", "tkids");
      sortByLabel(ms).forEach(m => kids.appendChild(leafRow(m)));
      twist(row, kids);
      t.append(row, kids);
    }
  }
}

const CHEVRON = `<svg class="tw" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>`;
const areaName = a => a || "unfiled";
// Real areas first (A-Z); the unfiled leftovers always sink to the bottom.
const sortAreas = ks => ks.sort((a, b) => (!a - !b) || a.localeCompare(b));
const sortByLabel = ms => ms.sort((a, b) => (a.label || "").localeCompare(b.label || ""));
function el(tag, cls) { const e = document.createElement(tag); e.className = cls; if (cls === "tkids") e.setAttribute("role", "group"); return e; }

function folderRow(name, count, color) {
  const row = el("div", "tnode folder");
  row.tabIndex = 0;
  row.setAttribute("role", "treeitem");
  row.setAttribute("aria-expanded", "false");
  row.innerHTML = CHEVRON +
    (color ? `<span class="dot" style="background:${color}"></span>` : `<span class="pad"></span>`) +
    `<span class="name">${esc(name)}</span><span class="count">${count}</span>`;
  return row;
}

function leafRow(n) {
  const row = el("div", "tnode leaf");
  row.tabIndex = 0;
  row.setAttribute("role", "treeitem");
  row.dataset.id = n.id;
  row.innerHTML = `<span class="pad"></span><span class="dot" style="background:${colorFor(view, n)};opacity:.55"></span>` +
    `<span class="name">${esc(n.label || n.id)}</span>`;
  row.onclick = () => { select(n); if (matchMedia("(max-width: 780px)").matches) setMobileSidebar(false); };
  row.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); select(n); } };

}

// Wire a folder row to expand/collapse the children under it.
function twist(row, kids) {
  const toggle = () => {
    const open = kids.classList.toggle("open");

    row.setAttribute("aria-expanded", String(open));
  };
  row.onclick = toggle;
  row.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); } };
}

function tick() {
  // The model, top to bottom:
  //  - repulsion (1/d²) spreads neurons apart so they don't overlap;
  //  - short, firm links pull connected neurons into tight flowers (a topic/tag hub + its petals);
  //  - a gentle pull toward each community's centre separates the sub-clusters into their own bubbles;
  //  - every neuron is kept inside its project's region (hive) or the canvas (project) by a hard clamp,
  //    so lone, link-less neurons stay home instead of scattering.
  const rep = hiveScene() ? 2000 : 2800;
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i+1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy+.01;
      const f = rep/d2, d = Math.sqrt(d2), ux = dx/d, uy = dy/d;
      a.vx += ux*f; a.vy += uy*f; b.vx -= ux*f; b.vy -= uy*f;
    }
  }
  for (const l of links) {
    let dx = l.t.x-l.s.x, dy = l.t.y-l.s.y, d = Math.hypot(dx,dy)+.01;
    const rest = l.rel === "hub" ? 180 : l.rel === "cluster" ? 150 : l.rel === "area" ? 58 : l.rel === "semantic" ? 62 : 52;
    const k = (l.rel === "hub" || l.rel === "cluster") ? 0.01 : l.rel === "area" ? 0.05 : 0.06;
    const f = (d-rest)*k, ux = dx/d, uy = dy/d;
    l.s.vx += ux*f; l.s.vy += uy*f; l.t.vx -= ux*f; l.t.vy -= uy*f;
  }
  const cx = {}, cy = {}, cc = {};
  for (const n of nodes) { cx[n.comm] = (cx[n.comm]||0)+n.x; cy[n.comm] = (cy[n.comm]||0)+n.y; cc[n.comm] = (cc[n.comm]||0)+1; }
  for (const n of nodes) {
    if (cc[n.comm] > 1) { n.vx += (cx[n.comm]/cc[n.comm] - n.x) * 0.015; n.vy += (cy[n.comm]/cc[n.comm] - n.y) * 0.015; }
    const hx = n.ax != null ? n.ax : 0, hy = n.ay != null ? n.ay : 0;
    n.vx += (hx - n.x) * (n.ax != null ? 0.02 : 0.004);
    n.vy += (hy - n.y) * (n.ax != null ? 0.02 : 0.004);
    const sp = Math.hypot(n.vx, n.vy); if (sp > 24) { n.vx = n.vx/sp*24; n.vy = n.vy/sp*24; }
    if (n.pin) { n.vx = n.vy = 0; continue; }
    n.x += n.vx*heat; n.y += n.vy*heat; n.vx *= 0.85; n.vy *= 0.85;
    // Hard boundary: no neuron may leave its cluster's disc.
    const rmax = n.rmax || 300;
    const ox = n.x - hx, oy = n.y - hy, od = Math.hypot(ox, oy);
    if (od > rmax) { n.x = hx + ox/od*rmax; n.y = hy + oy/od*rmax; n.vx *= 0.4; n.vy *= 0.4; }
  }
  // Seat each hub at the centre of its OWN cluster: a project hub on all its memories, an area hub
  // on that area's alone. Note `group` means the project in the hive and the area in a project, so
  // an area hub must be keyed by group+area, never group.
  const gx = {}, gy = {}, gn = {};      // per project/group
  const ax = {}, ay = {}, an = {};      // per group|area
  for (const n of nodes) {
    if (n.kind === "project" || n.kind === "core" || n.kind === "area") continue;
    gx[n.group] = (gx[n.group]||0)+n.x; gy[n.group] = (gy[n.group]||0)+n.y; gn[n.group] = (gn[n.group]||0)+1;
    const k = n.group + "|" + (n.area || "");
    ax[k] = (ax[k]||0)+n.x; ay[k] = (ay[k]||0)+n.y; an[k] = (an[k]||0)+1;
  }
  for (const n of nodes) {
    if (n.kind === "project" && gn[n.group]) {
      n.x = gx[n.group]/gn[n.group]; n.y = gy[n.group]/gn[n.group]; n.vx = n.vy = 0;
    } else if (n.kind === "area") {
      const k = n.group + "|" + (n.area || "");
      if (an[k]) { n.x = ax[k]/an[k]; n.y = ay[k]/an[k]; n.vx = n.vy = 0; }
    }
  }
  heat *= 0.985; if (heat < 0.03) heat = 0;
}

function draw() {
  const w = Math.max(1, Math.round(cv.clientWidth * devicePixelRatio));
  const h = Math.max(1, Math.round(cv.clientHeight * devicePixelRatio));
  // Setting canvas width/height clears its backing store and reallocates pixels. Only resize when
  // the CSS box or device scale actually changed, not on every animation frame.
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,w,h);
  ctx.setTransform(T.k*devicePixelRatio,0,0,T.k*devicePixelRatio, T.x*devicePixelRatio, T.y*devicePixelRatio);
  // Focus is expressed by CONTRAST, not decoration. Whatever you picked keeps its own colour at full
  // strength; everything else recedes. No rings, no fattened lines — those read as clutter, and they
  // fight the graph instead of clarifying it.
  // The rest of the hive doesn't vanish when you zoom into a project, it recedes — so you always
  // know you're inside one brain. Ease it so the fade rides along with the camera.
  const want = (unified && view === "project" && project) ? 0.07 : 1;
  if (Math.abs(rest - want) > 0.002) { rest += (want - rest) * 0.12; invalidate(); } else rest = want;

  const nb = neighbors(selected);
  const ends = selectedEdge ? [selectedEdge.s, selectedEdge.t] : null;
  const filtering = !!(edgeFilter || byFilter || filter || pathNodeIds.size);
  const focused = !!(selected || selectedEdge || pathNodeIds.size || filtering);
  for (const l of links) {
    if (!linkShown(l) || !existed(l.s) || !existed(l.t)) continue;
    // A link is lit when it IS the pick, or when it hangs off the picked neuron.
    const lit = pathLinkKeys.has(pathKey(l)) || (selectedEdge
      ? l === selectedEdge
      : selected && (l.s === selected || l.t === selected));
    const confidence = l.confidence == null ? 1 : Math.max(.25, l.confidence);
    ctx.globalAlpha = (lit ? 1 : filtering ? 0.72 : focused ? 0.14 : 0.38) * confidence * (inFocus(l.s) && inFocus(l.t) ? 1 : rest);
    ctx.strokeStyle = edgeStyle[l.rel]?.color || "rgba(120,130,150,.5)";
    ctx.lineWidth = (lit ? 2.2 : l.rel === "user" ? 1.3 : 0.7) / T.k;
    ctx.setLineDash(l.trust === "ambiguous" ? [2/T.k, 4/T.k] : l.trust === "inferred" ? [6/T.k, 3/T.k] : []);
    // Bow each link slightly so overlapping links read as separate strands, not one straight tangle.
    const c = bow(l);

    ctx.setLineDash([]);
  }
  ctx.globalAlpha = 1;
  // The wire you are dragging out in link mode, so you can see the connection before committing.
  if (linkMode && linkFrom && mouseWorld) {
    ctx.setLineDash([5 / T.k, 4 / T.k]);
    ctx.strokeStyle = "rgba(255,222,89,.9)";
    ctx.lineWidth = 1.6 / T.k;
    ctx.beginPath(); ctx.moveTo(linkFrom.x, linkFrom.y); ctx.lineTo(mouseWorld.x, mouseWorld.y); ctx.stroke();
    ctx.setLineDash([]);
  }
  for (const n of nodes) {
    if (!existed(n) || !nodeShown(n)) continue;
    const r = radius(n);
    const lit = pathNodeIds.has(n.id) || (ends
      ? (n === ends[0] || n === ends[1])
      : (!selected || n === selected || nb.has(n)));
    const context = (byFilter && n.by !== byFilter) || (filter && !match(n)) ||
      (pathFrom && n !== pathFrom);
    ctx.globalAlpha = (context ? 0.24 : lit ? 1 : filtering ? 0.88 : 0.1) * (inFocus(n) ? 1 : rest);
    ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, 7);
    ctx.fillStyle = colorFor(view, n); ctx.fill();
    if (n === linkFrom) { ctx.lineWidth = 2/T.k; ctx.strokeStyle = "#ffde59"; ctx.stroke(); }
    else if (n.stale && !context) {
      // Amber, not the brand yellow: this is a warning, and it must not read as "selected".
      ctx.globalAlpha = (lit ? 1 : 0.35) * (inFocus(n) ? 1 : rest);
      ctx.lineWidth = 1.8 / T.k;
      ctx.strokeStyle = n.stale.relocated_to ? "#8fb0f5" : "#ff8a3d";   // moved vs actually changed
      ctx.beginPath(); ctx.arc(n.x, n.y, r + 3.5 / T.k, 0, 7); ctx.stroke();
    }
    // Name what is in focus. When something is picked, only its own cluster is worth reading.
    const named = (pathFrom ? (n === pathFrom || nb.has(n) || r * T.k > 7)
      : pathNodeIds.size ? pathNodeIds.has(n.id) : filtering ? !context : focused ? lit : r * T.k > 9) && inFocus(n);
    if (named) {
      ctx.globalAlpha = lit ? 0.95 : 0.35;
      ctx.fillStyle = "#cdd3df";
      ctx.font = `${11/T.k}px -apple-system,Segoe UI,sans-serif`;
      ctx.fillText((n.label||"").slice(0,24), n.x + r + 4/T.k, n.y + 3.5/T.k);
    }

}

// Communities of densely-connected neurons (label propagation over content links only, ignoring the
// structural hive spokes), so the layout can pull each into its own bubble.
function detectCommunities() {
  // New servers send one deterministic assignment for every client. Keep the local pass only as a
  // compatibility fallback for older stores during rolling upgrades.
  if (nodes.length && nodes.every(n => n.community)) {
    for (const n of nodes) n.comm = n.community;
    return;
  }
  const adj = {};
  for (const n of nodes) { adj[n.id] = []; n.comm = n.id; }
  for (const l of links) {
    if (l.rel === "hub" || l.rel === "cluster") continue;
    adj[l.source].push(l.target); adj[l.target].push(l.source);
  }
  for (let iter = 0; iter < 8; iter++) {
    let changed = false;
    for (const n of nodes) {
      const nb = adj[n.id]; if (!nb.length) continue;
      const counts = {};
      for (const m of nb) { const c = byId[m].comm; counts[c] = (counts[c]||0)+1; }
      let best = n.comm, bc = -1;
      for (const c in counts) if (counts[c] > bc || (counts[c] === bc && c < best)) { bc = counts[c]; best = c; }
      if (best !== n.comm) { n.comm = best; changed = true; }
    }
    if (!changed) break;
  }
}

function radius(n) { return n.kind === "core" ? 6.5 : n.kind === "project" ? 5.5 : n.kind === "area" ? 5.5 : 2 + Math.min(2.6, n.degree * 0.3); }
// Filters define one actual subgraph, not a translucent suggestion. The same predicate controls
// drawing, hit-testing, labels, and neighbourhood counts so an invisible line can never be clicked.
function linkMatchesFilters(l) {
  if (pathLinkKeys.size) return pathLinkKeys.has(pathKey(l));
  if (edgeFilter && l.rel !== edgeFilter) return false;
  if (byFilter && (l.s.by !== byFilter || l.t.by !== byFilter)) return false;
  if (filter && !match(l.s) && !match(l.t)) return false;
  return true;
}
function linkShown(l) {
  if (!linkMatchesFilters(l)) return false;
  if (pathFrom) return false;
  if (selectedEdge) return l === selectedEdge;
  if (pathLinkKeys.size) return true;
  return !selected || l.s === selected || l.t === selected;
}
function neighbors(n) {
  const s = new Set();
  if (!n) return s;
  for (const l of links) {
    if (!linkMatchesFilters(l)) continue;
    if (l.s===n) s.add(l.t); if (l.t===n) s.add(l.s);
  }
  return s;
}
function nodeShown(n) {
  if (pathFrom) return !isHubKind(n);
  if (pathNodeIds.size) return pathNodeIds.has(n.id);
  if (selectedEdge) return n === selectedEdge.s || n === selectedEdge.t;
  if (selected) return n === selected || neighbors(selected).has(n);
  if (!edgeFilter && !byFilter && !filter) return true;
  if ((byFilter && n.by === byFilter) || (filter && match(n))) return true;
  return links.some(l => linkMatchesFilters(l) && (l.s === n || l.t === n));
}
function match(n) { return (n.label||"").toLowerCase().includes(filter) || (n.snippet||"").toLowerCase().includes(filter); }
// A signal travelling a wire, and a neuron firing when it lands. These play only on REAL events —
// a memory an agent wrote, a link that appeared — so motion always means something happened.
const now = () => performance.now();
const signals = [];   // { l, t0 }  an action potential running source -> target
const flares = [];    // { n, t0 }  a neuron firing
const SIGNAL_MS = 260, FLARE_MS = 220;
function fire(l) { if (signals.length < 12) signals.push({ l, t0: now() }); invalidate(); }
function flash(n) { if (flares.length < 16) flares.push({ n, t0: now() }); invalidate(); }
// Position along the link's curve, using the same control point we draw and click with.
function alongCurve(l, t) {
  const c = bow(l), u = 1 - t;
  return {
    x: u*u*l.s.x + 2*u*t*c.x + t*t*l.t.x,
    y: u*u*l.s.y + 2*u*t*c.y + t*t*l.t.y,
  };
}
function drawSignals() {
  const t = now();
  for (let i = signals.length - 1; i >= 0; i--) {
    const s = signals[i];
    const p = (t - s.t0) / SIGNAL_MS;
    if (p >= 1) { flash(s.l.t); signals.splice(i, 1); continue; }   // it arrives, the neuron fires
    if (!linkShown(s.l)) continue;
    // Ease out, so it leaves fast and lands softly — like a real spike, not a constant-speed dot.
    const e = 1 - Math.pow(1 - p, 2.2);
    const at = alongCurve(s.l, e);
    // A bright head with a soft halo, and a short comet tail behind it.
    const tail = alongCurve(s.l, Math.max(0, e - 0.12));
    const g = ctx.createLinearGradient(tail.x, tail.y, at.x, at.y);
    g.addColorStop(0, "rgba(255,222,89,0)");
    g.addColorStop(1, "rgba(255,222,89,.85)");
    ctx.strokeStyle = g; ctx.lineWidth = 2.2 / T.k; ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.moveTo(tail.x, tail.y); ctx.lineTo(at.x, at.y); ctx.stroke();
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = "#ffde59";
    ctx.beginPath(); ctx.arc(at.x, at.y, 6 / T.k, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#fff8dc";
    ctx.beginPath(); ctx.arc(at.x, at.y, 2.4 / T.k, 0, 7); ctx.fill();
  }
  for (let i = flares.length - 1; i >= 0; i--) {
    const f = flares[i];
    const p = (t - f.t0) / FLARE_MS;
    if (p >= 1) { flares.splice(i, 1); continue; }
    if (!nodeShown(f.n)) continue;
    const r = radius(f.n);
    // An expanding ring that fades: the neuron discharging.
    ctx.globalAlpha = (1 - p) * 0.7;
    ctx.strokeStyle = "#ffde59";
    ctx.lineWidth = 1.8 / T.k;
    ctx.beginPath(); ctx.arc(f.n.x, f.n.y, r + (18 * p) / T.k, 0, 7); ctx.stroke();
    // ...and a warm core while it settles.
    ctx.globalAlpha = (1 - p) * 0.5;
    ctx.fillStyle = "#ffde59";
    ctx.beginPath(); ctx.arc(f.n.x, f.n.y, r + 1, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (signals.length || flares.length) invalidate();
}

// TIME. The ledger is append-only, so the graph can be rewound: show only what existed at a moment,
// and you watch the brain build itself. `timeAt === null` means now (live).
let timeAt = null, visibleSet = null, playing = null;
const isHubKind = n => ["core", "project", "area"].includes(n.kind);
function computeVisible() {
  const before = visibleSet;
  if (!timeAt) { visibleSet = null; return; }
  const vis = new Set();
  for (const n of nodes) if (!isHubKind(n) && (!n.born || n.born <= timeAt)) vis.add(n);
  // A hub only exists once something is filed under it.
  for (const n of nodes) {
    if (!isHubKind(n)) continue;
    if (n.kind === "core") { vis.add(n); continue; }
    const has = nodes.some(m => !isHubKind(m) && vis.has(m) && m.group === n.group &&
      (n.kind !== "area" || (m.area || "") === n.area));
    if (has) vis.add(n);
  }
  visibleSet = vis;

  // Replaying history should LOOK like the brain building itself, not like rows appearing in a table.
  // A memory being born flares; a connection forming fires a signal down the wire — the same
  // animations a live write triggers, because it is the same event, just replayed.
  if (!before) return;                                   // first frame of a scrub: no flood
  for (const n of nodes) {
    if (isHubKind(n) || !vis.has(n) || before.has(n)) continue;
    if (flares.length < 90) flash(n);                    // it just came into existence
  }
  for (const l of links) {
    if (!vis.has(l.s) || !vis.has(l.t)) continue;
    if (before.has(l.s) && before.has(l.t)) continue;     // the link already existed
    if (signals.length < 70) fire(l);                    // a connection just formed
  }
}
const existed = n => !visibleSet || visibleSet.has(n);

let rest = 1;   // how visible the rest of the hive is while a project is framed
let dirty = true;
const invalidate = () => { dirty = true; };
// Delegated actions. Data lives in data-* attributes (inert), never interpolated into JS.
document.addEventListener("click", e => {
  const t = e.target.closest("[data-act]");
  if (!t) return;
  const d = t.dataset;
  switch (d.act) {
    case "edit": editMem(d.id); break;
    case "del": delMem(d.id); break;
    case "forget": forgetProj(d.name); break;
    case "browse": browseTo(d.path); break;
    case "addproj": addProj(d.path, d.name, d.marrow === "true"); break;
    case "closedetail": closeDetail(); break;
    case "closeedge": closeEdgeMenu(); break;
    case "goto": jumpToMemory(d.id, null); break;
    case "review-open": openReview(Number(d.review)); break;
    case "review-edge": openReviewEdge(); break;
    case "review-link": startReviewLink(); break;
    case "save": saveMem(d.id || null); break;
    case "edge-remove": removeEdge(); break;
    case "edge-insert": insertBetween(); break;
    case "edge-reconnect": startReconnect(); break;
    case "path-start": startPath(); break;
    case "path-clear": clearPath(); break;
    case "copy-id": navigator.clipboard.writeText(d.id).then(() => toast("memory ID copied")); break;
  }
});

function loop() {
  stepCamera();
  if (heat > 0) { tick(); dirty = true; }
  // Clear the flag BEFORE drawing. draw() is what runs the animations, and they ask for the next
  // frame from inside it — clearing afterwards wiped that request, so every animation froze on its
  // first frame.
  if (dirty) { dirty = false; draw(); }
  requestAnimationFrame(loop);
}

function fit() {
  if (!nodes.length) return;
  const xs = nodes.map(n=>n.x), ys = nodes.map(n=>n.y);
  const minx = Math.min(...xs), maxx = Math.max(...xs), miny = Math.min(...ys), maxy = Math.max(...ys);
  const w = cv.clientWidth, h = cv.clientHeight;
  const k = Math.min(2.2, 0.85 * Math.min(w/(maxx-minx+120), h/(maxy-miny+120)));
  T.k = isFinite(k) && k > 0 ? k : 1;
  T.x = w/2 - (minx+maxx)/2*T.k; T.y = h/2 - (miny+maxy)/2*T.k;

  try { data = await (await fetch("/api/channel?thread=" + encodeURIComponent(thread))).json(); }
  catch { panel.innerHTML = `<div class="empty">Could not load this conversation.</div>`; return; }
  if (thread !== channelSelected) return;
  const room = channelRooms.find(r => r.thread === thread) || {};
  const participants = room.participants || [];
  const people = participants.length
    ? participants.slice(0, 3).join(", ") + (participants.length > 3 ? ` +${participants.length - 3}` : "")
    : "No participants yet";
  panel.innerHTML = `<div class="conversation-head"><button class="back" aria-label="Back to rooms">${CHEVRON_LEFT}</button><div><h2>${esc(room.topic || data.topic || "Untitled room")}</h2><p>${esc(people)} · ${room.message_count || (data.messages || []).length} messages</p></div></div>

function renderMessage(m) {

async function sendChannelReply() {

// ---------- the time machine ----------
let span = null;   // [oldest, newest] birth dates in the scene
function timeSpan() {
  const born = nodes.filter(n => n.born).map(n => n.born).sort();
  return born.length ? [born[0], born[born.length - 1]] : null;
}
const atFraction = f => {
  if (!span) return null;
  const a = new Date(span[0]).getTime(), b = new Date(span[1]).getTime();
  return new Date(a + (b - a) * f).toISOString();
};
function setTime(f) {
  const range = document.getElementById("tl-range");
  range.style.setProperty("--p", (f * 100) + "%");
  timeAt = f >= 1 ? null : atFraction(f);     // dragged to the end = live
  computeVisible();
  const total = nodes.filter(n => !isHubKind(n)).length;
  const shown = timeAt ? [...visibleSet].filter(n => !isHubKind(n)).length : total;
  document.getElementById("tl-when").textContent = timeAt
    ? new Date(timeAt).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })
    : "now";
  document.getElementById("tl-count").textContent = `${shown} of ${total} memories`;
  invalidate();
}
function stopPlay() {
  if (playing) { cancelAnimationFrame(playing); playing = null; }
  document.getElementById("tl-play").innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M5.6 3.4l7 4.6-7 4.6z"/></svg>`;
}
// Replay the brain's growth. This is what "episodic memory" actually MEANS, made watchable.
function play() {
  const range = document.getElementById("tl-range");
  stopPlay();
  const REPLAY_MS = 14000;
  const t0 = now();
  document.getElementById("tl-play").innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><rect x="4.4" y="3.2" width="2.8" height="9.6" rx="1.1"/><rect x="8.8" y="3.2" width="2.8" height="9.6" rx="1.1"/></svg>`;
  const step = () => {
    const f = Math.min(1, (now() - t0) / REPLAY_MS);
    range.value = String(Math.round(f * 1000));
    setTime(f);
    if (f < 1) playing = requestAnimationFrame(step);
    else stopPlay();
  };
  playing = requestAnimationFrame(step);
}

document.getElementById("tl-range").oninput = e => { stopPlay(); setTime(e.target.value / 1000); };
document.getElementById("tl-play").onclick = () => { playing ? stopPlay() : play(); };
document.getElementById("history").onclick = () => {
  const tl = document.getElementById("tl");
  const on = tl.hidden;
  tl.hidden = !on;
  document.getElementById("history").classList.toggle("on", on);
  if (on) {
    span = timeSpan();
    document.getElementById("tl-range").value = "1000";
    setTime(1);
    loadAudit();
  } else { stopPlay(); timeAt = null; visibleSet = null; invalidate(); }
};

// "Tamper-evident" is a claim. Prove it.
async function loadAudit() {
  const el = document.getElementById("tl-audit");
  try {
    const d = await (await fetch(view === "hive" ? "/api/audit/hive" : "/api/audit" + pq())).json();
    const n = (d.events || 0).toLocaleString();
    el.classList.toggle("broken", !d.ok);
    el.innerHTML = d.ok
      ? `<b>chain intact</b><br>${n} events`
      : `<b>chain broken</b><br>at #${d.broken_at_seq}`;
  } catch { el.textContent = ""; }
}

document.getElementById("help").onclick = helpModal;

// LIVE. Poll a cheap fingerprint; only refetch the graph when something actually changed. Agents
// write memories while you watch, so the brain should show it happening rather than going stale.
let rev = null, livePaused = false;
const VERBS = { write: "wrote", supersede: "revised", retrieve: "recalled", claim: "claimed",
  release: "released", progress: "worked on", session_started: "started", finished: "finished",
  consolidate: "consolidated", observe: "noted", message: "messaged" };

async function pulse() {
  if (document.hidden || livePaused || view === "channel") return;
  try {
    const q = view === "hive" ? "?view=hive" : pq();
    const d = await (await fetch("/api/pulse" + q)).json();
    if (rev !== null && d.rev !== rev) await load({ keep: true });   // keep the layout, animate what's new
    rev = d.rev;
    renderLive(d.activity || []);
  } catch {}
}

// Only touch the DOM for rows that are actually NEW, or every poll re-runs the entry
// animation on every row, so the whole panel strobed even when nothing had happened.
let liveSeen = new Set();
function renderLive(events) {
  const box = document.getElementById("live"), rows = document.getElementById("live-rows");
  if (!events.length) { box.hidden = true; return; }
  box.hidden = false;

  const fresh = events.filter(e => !liveSeen.has(e.id));
  if (!fresh.length) return;                       // nothing new: leave the panel completely alone
  const first = liveSeen.size === 0;               // first paint shouldn't animate a whole backlog in

  // Newest first, so prepend in reverse and let the older rows shift down beneath them.
  for (const e of fresh.slice().reverse()) {
    liveSeen.add(e.id);
    const verb = VERBS[e.kind] || e.kind;
    const what = (e.summary || "").replace(/^[a-z_]+:\s*/i, "");
    // Most summaries are already a sentence ("wrote fact 'x'"); prefixing the verb again read
    // "wrote wrote fact 'x'".
    const line = what.toLowerCase().startsWith(verb.toLowerCase()) ? what : `${verb} ${what}`;
    const row = document.createElement("div");
    row.className = "live-row" + (first ? " nofade" : "");
    if (e.memory) { row.classList.add("jump"); row.dataset.mem = e.memory; if (e.project) row.dataset.proj = e.project; }
    row.innerHTML = `<span class="who">${esc(e.actor || "agent")}</span>` +
      `<span class="what">${esc(line)}</span>` +
      `<span class="when" data-ts="${esc(e.ts)}">${ago(e.ts)}</span>`;
    rows.prepend(row);
  }
  while (rows.children.length > 6) rows.lastChild.remove();
  // Keep the relative times honest without re-rendering anything.
  for (const w of rows.querySelectorAll(".when")) w.textContent = ago(w.dataset.ts);
  if (liveSeen.size > 400) liveSeen = new Set(events.map(e => e.id));
}

// Click an activity row to go to the memory it mentions, whichever view you're in.
document.getElementById("live-rows").onclick = e => {
  const row = e.target.closest(".jump");
  if (!row) return;
  jumpToMemory(row.dataset.mem, row.dataset.proj);
};

function ago(ts) {
  const s = Math.max(0, (Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60) return "now";
  if (s < 3600) return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}d`;
}

document.getElementById("live-x").onclick = () => {
  livePaused = !livePaused;
  const b = document.getElementById("live-x");
  b.setAttribute("aria-expanded", String(!livePaused));
  b.setAttribute("aria-label", livePaused ? "Expand activity" : "Collapse activity");
  b.title = livePaused ? "Expand" : "Collapse";
  document.getElementById("live").classList.toggle("collapsed", livePaused);
};

loadProjects().then(() => setView(view)).then(() => { pulse(); setInterval(pulse, 2500); });
loop();
</script>
</body>
