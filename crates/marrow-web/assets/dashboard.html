<style>
  :root {
    --bg: #0d0f14; --panel: #151922; --panel2: #1b2029; --line: #262b36;
    --text: #e6e9ef; --muted: #8b93a4; --accent: #ffde59; --gold: #ffde59;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { background: var(--bg); color: var(--text); overflow: hidden;
    font: 13px/1.5 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; flex-wrap: wrap;
    row-gap: 8px; border-bottom: 1px solid var(--line); background: var(--bg); z-index: 5; }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; font-weight: 600; display: flex; align-items: center; }
  .brand-wm { height: 18px; width: auto; display: block; }
  .spacer { flex: 1; }
  button, .seg { background: var(--panel); color: var(--text); border: 1px solid var(--line);
    padding: 6px 11px; border-radius: 7px; cursor: pointer; font-size: 12px; }
  button:hover { border-color: #3a4152; }
  button.on { background: var(--accent); border-color: var(--accent); color: #0d0f14; font-weight: 600; }
  /* Segmented control: one recessed track, the active tab raised out of it. */
  .seg { display: inline-flex; gap: 2px; padding: 3px; background: var(--panel2);
    border: 1px solid var(--line); border-radius: 9px; overflow: visible; }
  .seg button { border: 0; background: transparent; color: var(--muted); border-radius: 6px;
    padding: 5px 13px; font-size: 12px; font-weight: 600; letter-spacing: .2px; cursor: pointer;
    transition: background .16s ease, color .16s ease; }
  .seg button:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .seg button.on { background: var(--accent); color: #0d0f14; }
  .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  button svg.ico { width: 14px; height: 14px; flex: 0 0 auto; vertical-align: -2px; }
  .dock button[hidden] { display: none; }
  #proj[hidden] { display: none; }
  input[type=search], select, .modal-card input, .modal-card textarea, .modal-card select {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    padding: 6px 10px; border-radius: 7px; font-size: 12px; }
  input[type=search] { width: 190px; }
  select#proj { max-width: 190px; cursor: pointer; }
  #modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none;
    align-items: center; justify-content: center; z-index: 20; }
  #modal.show { display: flex; }
  .modal-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    padding: 20px; width: 480px; max-width: 92vw; max-height: 86vh; overflow: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.6); }
  .modal-card h3 { margin: 0 0 12px; font-size: 15px; }
  .modal-card label { display: block; color: var(--muted); font-size: 11px; margin: 10px 0 4px; }
  .modal-card input, .modal-card textarea, .modal-card select { width: 100%; }
  .modal-card textarea { resize: vertical; font-family: inherit; line-height: 1.5; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .modal-card hr { border: 0; border-top: 1px solid var(--line); margin: 18px 0; }
  .modal-card p { margin: 8px 0; line-height: 1.55; }
  .modal-card .dim { color: var(--muted); }
  .modal-card code { background: var(--panel2); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .row-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
  .row-item .dim { color: var(--muted); font-size: 11px; flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap; }
  .brow { display: flex; align-items: center; justify-content: space-between; gap: 8px;
    padding: 5px 8px; border-radius: 6px; cursor: pointer; }
  .brow:hover { background: var(--panel2); }
  .brow .nav { flex: 1; cursor: pointer; }
  .brow small { color: var(--accent); }
  .fico { width: 14px; height: 14px; vertical-align: -3px; margin-right: 6px; color: var(--muted); }
  .fico.on { color: var(--accent); }
  #detail .sec { margin: 14px 0 6px; font-size: 10px; letter-spacing: .06em; text-transform: uppercase;
    color: var(--muted); font-weight: 600; }
  /* A warning has to look like a warning, and must not be mistaken for "selected". */
  #detail .warn { display: flex; flex-direction: column; gap: 3px; margin: 10px 0;
    padding: 9px 10px; border-radius: 8px; font-size: 11px; line-height: 1.45;
    background: rgba(255,138,61,.12); border: 1px solid rgba(255,138,61,.38); color: #ffd2ae; }
  #detail .warn b { color: #ff8a3d; }
  #detail .warn span { color: var(--muted); }
  #detail .warn.moved { background: rgba(143,176,245,.1); border-color: rgba(143,176,245,.35); color: #cfe0ff; }
  #detail .warn.moved b { color: #8fb0f5; }
  /* Lineage reads top-down like a commit log: newest first, "now" highlighted. */
  #detail .lin-row { display: flex; gap: 8px; align-items: baseline; padding: 4px 6px; margin: 0 -6px;
    border-radius: 5px; font-size: 11px; cursor: pointer; transition: background .14s ease; }
  #detail .lin-row:hover { background: var(--panel2); }
  #detail .lin-row.here { cursor: default; background: rgba(255,222,89,.1); }
  #detail .lin-row.here:hover { background: rgba(255,222,89,.1); }
  #detail .lin-verb { color: var(--muted); font-size: 10px; white-space: nowrap; min-width: 62px; }
  #detail .lin-row.here .lin-verb { color: var(--accent); font-weight: 600; }
  #detail .lin-topic { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #detail .acts { display: flex; gap: 8px; margin-top: 12px; }
  #detail .acts.col { flex-direction: column; gap: 6px; }
  #detail .acts.col button { width: 100%; text-align: left; padding: 7px 10px; }
  /* The two neurons a link joins, drawn as the link itself. */
  #detail .pair { margin: 12px 0 10px; }
  #detail .pair-row { display: flex; align-items: center; gap: 8px; font-size: 12px;
    color: var(--text); line-height: 1.4; }
  #detail .pair-row .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 auto; }
  #detail .pair-wire { width: 2px; height: 16px; margin: 3px 0 3px 3.5px; border-radius: 1px;
    background: var(--accent); opacity: .75; }
  #detail .acts button { font-size: 11px; padding: 4px 10px; }
  .danger { color: #ff6b6b; }
  .pill { font-size: 10px; padding: 1px 7px; border-radius: 9px; background: var(--panel2);
    color: var(--muted); border: 1px solid var(--line); vertical-align: middle; }
  .pill.on { background: rgba(255,222,89,.14); color: var(--accent); border-color: transparent; }
  .sharebox:empty { display: none; }
  .sharebox { padding: 2px 0 8px; }
  .sharegrid { display: flex; flex-direction: column; gap: 6px; }
  .sharegrid input { background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 6px 8px; font-size: 12px; }
  .sharebtns { display: flex; gap: 8px; }
  main { display: grid; grid-template-columns: 250px 1fr; height: calc(100vh - 49px); }
  /* Sidebar = places. Actions on top, then the directory, which is the part that scrolls. */
  aside.side { display: flex; flex-direction: column; overflow: hidden; }
  .side-act { padding: 10px 8px 8px; border-bottom: 1px solid var(--line); }
  .side-act button { width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px;
    padding: 7px 10px; font-size: 12px; font-weight: 600; }
  #tree { flex: 1; overflow: auto; padding: 8px 0; scrollbar-width: thin; }
  /* Dock = tools that act on the canvas, so they live on the canvas. */
  /* Time. The ledger is append-only, so the brain's whole history is replayable. */
  .tl { position: absolute; left: 50%; bottom: 76px; transform: translateX(-50%); z-index: 20;
    display: flex; align-items: center; gap: 12px; width: min(620px, calc(100% - 40px));
    padding: 9px 14px; background: rgba(21,25,34,.93); backdrop-filter: blur(12px);
    border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  .tl[hidden] { display: none; }
  /* The global button rule (padding + border) was fighting this; zero both or the circle inflates. */
  .tl-play { flex: 0 0 auto; width: 32px; height: 32px; padding: 0; border: 0; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--accent); color: #0d0f14; cursor: pointer;
    transition: transform .12s ease, box-shadow .12s ease; }
  .tl-play:hover { transform: scale(1.06); box-shadow: 0 0 0 4px rgba(255,222,89,.16); }
  .tl-play:active { transform: scale(.96); }
  .tl-play:focus { outline: none; }                       /* kill the browser's blue ring */
  .tl-play:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  .tl-play svg { width: 15px; height: 15px; display: block; }
  .tl input[type=range] { flex: 1; -webkit-appearance: none; appearance: none; height: 3px;
    border-radius: 2px; background: linear-gradient(90deg, var(--accent) var(--p, 100%), var(--line) var(--p, 100%));
    cursor: pointer; }
  .tl input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px;
    border-radius: 50%; background: #fff; border: 2px solid var(--accent); cursor: grab; }
  .tl-meta { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; line-height: 1.25; }
  #tl-when { font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; }
  #tl-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .tl-audit { flex: 0 0 auto; font-size: 10px; color: var(--muted); white-space: nowrap;
    padding-left: 12px; border-left: 1px solid var(--line); }
  .tl-audit b { color: #57cf9c; }
  .tl-audit.broken b { color: #ff6b6b; }
  .dock { position: absolute; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 20;
    display: flex; align-items: center; gap: 4px; padding: 6px;
    background: rgba(21,25,34,.9); backdrop-filter: blur(12px);
    border: 1px solid var(--line); border-radius: 13px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  .dock button { border: 0; background: transparent; color: var(--muted); border-radius: 8px;
    padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .15s ease, color .15s ease; }
  .dock button:hover { background: var(--panel2); color: var(--text); }
  .dock button.on { background: var(--accent); color: #0d0f14; }
  .dock button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .dock .sep { width: 1px; height: 18px; background: var(--line); margin: 0 3px; }
  .dock[hidden] { display: none; }
  /* Link mode: say exactly what to do next, and show the wire following the cursor. */
  .linkbar { position: absolute; left: 50%; bottom: 78px; transform: translateX(-50%); z-index: 20;
    display: none; align-items: center; gap: 9px; padding: 9px 14px; font-size: 12px;
    color: var(--text); background: rgba(21,25,34,.94); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,222,89,.4); border-radius: 10px;
    box-shadow: 0 8px 26px rgba(0,0,0,.5); white-space: nowrap; }
  .linkbar.show { display: flex; }
  .linkbar .step { display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #0d0f14;
    font-weight: 700; font-size: 10px; flex: 0 0 auto; }
  .linkbar b { color: var(--accent); font-weight: 600; }
  .linkbar kbd { background: var(--panel2); border: 1px solid var(--line); border-radius: 4px;
    padding: 1px 5px; font-size: 10px; color: var(--muted); }
  .stage.linking canvas { cursor: crosshair; }
  aside { border-right: 1px solid var(--line); background: var(--panel); overflow: auto;
    padding: 10px 0; scrollbar-width: thin; }
  /* File-tree: folders (project / area) nest down to the memories inside them. */
  .tnode { display: flex; align-items: center; gap: 6px; margin: 0 6px; padding: 4px 8px;
    border-radius: 6px; cursor: pointer; font-size: 12px; line-height: 1.4; user-select: none;
    transition: background .15s ease, color .15s ease; }
  .tnode:hover { background: var(--panel2); }
  .tnode:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .tnode .tw { width: 12px; height: 12px; flex: 0 0 auto; color: var(--muted);
    transition: transform .16s ease; }
  .tnode.open > .tw { transform: rotate(90deg); }
  .tnode .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tnode .count { color: var(--muted); font-size: 10.5px; font-variant-numeric: tabular-nums; }
  .tnode.folder { font-weight: 600; color: var(--text); }
  .tnode.leaf { color: var(--muted); font-weight: 400; }
  .tnode.leaf:hover { color: var(--text); }
  .tnode.leaf.sel { background: rgba(255,222,89,.16); color: var(--text); }
  .tnode .dot { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 auto; }
  .tnode .pad { width: 12px; flex: 0 0 auto; }
  /* Indent guide, so nesting is legible at a glance. */
  .tkids { display: none; margin-left: 17px; border-left: 1px solid var(--line); }
  .tkids.open { display: block; }
  .tempty { color: var(--muted); font-size: 11px; padding: 10px 16px; }
  .stage { position: relative; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  #detail { position: absolute; top: 12px; right: 12px; width: 300px; max-height: calc(100% - 24px);
    overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 14px; display: none; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
  #detail.show { display: block; }
  #detail .k { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
  #detail h3 { margin: 4px 0 10px; font-size: 15px; }
  #detail .body { color: #cdd3df; white-space: pre-wrap; font-size: 12px; }
  #detail .more { background: none; border: 0; color: var(--accent); cursor: pointer; padding: 3px 0; font-size: 12px; }
  #detail .meta { margin-top: 10px; color: var(--muted); font-size: 11px; }
  #detail .x { position: absolute; top: 8px; right: 10px; color: var(--muted); cursor: pointer; }
  /* What the agents are doing, right now. */
  .live { position: absolute; right: 12px; bottom: 12px; width: 268px; z-index: 12;
    background: rgba(21,25,34,.92); backdrop-filter: blur(12px);
    border: 1px solid var(--line); border-radius: 11px; padding: 10px 11px;
    box-shadow: 0 10px 30px rgba(0,0,0,.45); font-size: 11px; }
  .live[hidden] { display: none; }
  .live-head { display: flex; align-items: center; gap: 7px; font-weight: 600; color: var(--text);
    font-size: 11px; margin-bottom: 8px; }
  .live.collapsed { padding: 8px 11px; }
  .live.collapsed .live-head { margin-bottom: 0; }
  .live.collapsed .live-rows { display: none; }
  .live-x { margin-left: auto; display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; padding: 0; border: 0; background: none; color: var(--muted);
    border-radius: 5px; cursor: pointer; transition: background .14s ease, color .14s ease; }
  .live-x:hover { background: var(--panel2); color: var(--text); }
  .live-x:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .live-x svg { width: 14px; height: 14px; transition: transform .2s ease; }
  .live.collapsed .live-x svg { transform: rotate(180deg); }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
    box-shadow: 0 0 0 0 rgba(255,222,89,.6); animation: livepulse 2s ease-out infinite; }
  @keyframes livepulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,222,89,.55); }
    70%  { box-shadow: 0 0 0 7px rgba(255,222,89,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,222,89,0); }
  }
  .live-row { display: flex; gap: 7px; padding: 4px 0; color: var(--muted); line-height: 1.35;
    border-top: 1px solid rgba(255,255,255,.04); animation: livein .35s ease; }
  .live-row:first-child { border-top: 0; }
  @keyframes livein { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: none; } }
  .live-row .who { color: var(--accent); font-weight: 600; white-space: nowrap; }
  .live-row .what { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
  .live-row .when { color: var(--muted); font-size: 10px; white-space: nowrap; }
  .live-row.nofade { animation: none; }
  .live-row.jump { cursor: pointer; border-radius: 5px; margin: 0 -4px; padding-left: 4px; padding-right: 4px;
    transition: background .14s ease; }
  .live-row.jump:hover { background: var(--panel2); }
  .live-row.jump:hover .what { color: var(--accent); }
  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none; } .live-row { animation: none; }
  }
  .legend { position: absolute; left: 12px; bottom: 12px; background: rgba(21,25,34,.9);
    border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font-size: 11px; width: 232px; }
  .legend .li { display: flex; align-items: center; gap: 8px; width: 100%; padding: 4px 6px;
    margin: 0 -6px; border: 0; background: none; color: var(--muted); font: inherit; font-size: 11px;
    text-align: left; border-radius: 6px; cursor: pointer;
    transition: background .14s ease, opacity .14s ease; }
  .legend .li:hover { background: var(--panel2); color: var(--text); }
  .legend .li:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .legend .li.off { opacity: .35; }
  .legend .li.solo { background: rgba(255,222,89,.12); color: var(--text); }
  .legend .lg-label { flex: 1; }
  .legend .lg-count { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 10px; }
  .legend .lg-reset { width: 100%; margin-top: 6px; padding: 5px 6px; border: 0; border-radius: 6px;
    background: var(--panel2); color: var(--accent); font: inherit; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: background .14s ease; }
  .legend .lg-reset:hover { background: #232936; }
  .legend .lg-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px;
    color: var(--text); font-weight: 600; margin-bottom: 5px; }
  .legend .lg-help { color: var(--accent); cursor: pointer; font-weight: 400; font-size: 10px; white-space: nowrap; }
  .legend .dot { width: 10px; height: 10px; border-radius: 50%; flex: 0 0 auto; }
  .legend .edge { width: 18px; height: 3px; border-radius: 2px; flex: 0 0 auto; }
  .legend .lg-note { display: none; margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--line);
    color: var(--muted); line-height: 1.5; }
  .legend .lg-note.show { display: block; }
  .legend .lg-note b { color: var(--text); font-weight: 600; }
  .hint { position: absolute; left: 12px; top: 12px; color: var(--muted); font-size: 11px;
    background: rgba(21,25,34,.7); padding: 4px 9px; border-radius: 7px; }
  #toast { position: absolute; left: 50%; bottom: 84px; transform: translateX(-50%); z-index: 30;
    background: var(--accent); color: #0d0f14; font-weight: 600; padding: 7px 14px; border-radius: 8px;
    font-size: 12px; opacity: 0; transition: opacity .2s; pointer-events: none;
    display: flex; align-items: center; gap: 10px; }
  #toast.show { opacity: 1; }
  #toast.act { pointer-events: auto; }
  #toast button { all: unset; cursor: pointer; font: inherit; font-weight: 700; text-decoration: underline;
    text-underline-offset: 2px; padding: 0 2px; }
  #toast button:hover { opacity: .7; }
  .tip { position: absolute; pointer-events: none; background: #0b0e13; border: 1px solid var(--line);
    padding: 5px 9px; border-radius: 7px; font-size: 12px; max-width: 260px; display: none; z-index: 9; }
  #channel { position: absolute; inset: 0; display: none; overflow: auto; background: var(--bg); padding: 22px; }
  #channel.show { display: block; }
  #channel .wrap { max-width: 720px; margin: 0 auto; }
  #channel .ch-head { color: var(--muted); font-size: 12px; margin-bottom: 16px; }
  #channel .thread { background: var(--panel); border: 1px solid var(--line); border-radius: 12px;
    margin-bottom: 12px; overflow: hidden; }
  /* A room announces its subject and who is in it, so the channel reads as a set of conversations
     rather than one undifferentiated pile of messages. */
  #channel .room-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    cursor: pointer; user-select: none; }
  #channel .room-head:hover { background: var(--panel2); }
  #channel .room-head .caret { color: var(--muted); font-size: 11px; width: 10px; transition: transform .15s; }
  #channel .thread.open .room-head .caret { transform: rotate(90deg); }
  #channel .room-head .subject { font-weight: 600; font-size: 13px; color: var(--accent); }
  #channel .room-head .meta { color: var(--muted); font-size: 11px; margin-left: auto; text-align: right; }
  #channel .who-chip { display: inline-block; background: var(--panel2); border: 1px solid var(--line);
    border-radius: 20px; padding: 1px 8px; font-size: 10px; color: var(--fg); margin-left: 4px; }
  #channel .room-body { display: none; padding: 4px 16px 14px; border-top: 1px solid var(--line); }
  #channel .thread.open .room-body { display: block; }
  #channel .msg { display: flex; flex-direction: column; margin: 10px 0; max-width: 82%; }
  #channel .msg .who { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  #channel .msg .bubble { padding: 8px 12px; border-radius: 12px; font-size: 13px; line-height: 1.45;
    white-space: pre-wrap; }
  #channel .msg.ask { align-self: flex-start; }
  #channel .msg.ask .bubble { background: var(--panel2); border-top-left-radius: 4px; }
  #channel .msg.reply { align-self: flex-end; align-items: flex-end; }
  #channel .msg.reply .bubble { background: #3b3413; border: 1px solid #5c5220; border-top-right-radius: 4px; }
  #channel .empty { color: var(--muted); text-align: center; margin-top: 60px; }
  .detail .by { display: inline-block; border: 1px solid var(--line); border-radius: 20px;
    padding: 1px 9px; font-size: 10px; margin-bottom: 8px; }
</style>

<script>
const palette = ["#ffde59","#ffb057","#ff8a6b","#f2739f","#c78ef0","#8fb0f5","#5fc9d6","#57cf9c","#b5d35c","#e8b53c"];
// Edge types are real relationships, each its own colour so the graph is legible.
const edgeStyle = {
  ref:      { color: "rgba(255,138,107,0.62)", label: "explicit link" },
  topic:    { color: "rgba(143,176,245,0.32)", label: "shared topic" },
  tag:      { color: "rgba(87,207,156,0.32)",  label: "shared tag" },
  semantic: { color: "rgba(199,142,240,0.45)", label: "related meaning" },
  user:     { color: "rgba(255,222,89,0.70)",  label: "you linked" },
  hub:      { color: "rgba(255,222,89,0.32)",  label: "core ↔ project" },
  cluster:  { color: "rgba(120,130,150,0.28)", label: "project → area" },
  area:     { color: "rgba(140,150,170,0.22)", label: "in area" },
};
const colorMap = {};
// Zoomed out you need to tell PROJECTS apart; zoomed in, AREAS. Same neurons, different question.
function groupKey(n) { return (unified && view === "project") ? (n.area || "") : n.group; }
function colorFor(v, node) {
  if (node.kind === "core") return "#ffde59";
  if (node.kind === "project") return "#8b93a4";
  const g = groupKey(node);
  if (!g) return "#6b7280";                             // unfiled: deliberately drab
  if (!(g in colorMap)) colorMap[g] = palette[Object.keys(colorMap).length % palette.length];
  return colorMap[g];
}
// Where you were is part of the state: a refresh should not throw you back to the start.
const saved = (() => { try { return JSON.parse(localStorage.getItem("marrow.view") || "{}"); } catch { return {}; } })();
let view = ["project", "hive", "channel"].includes(saved.view) ? saved.view : "project";
let raw = { nodes: [], links: [] }, nodes = [], links = [], byId = {};
let filter = "", selected = null, linkMode = false, linkFrom = null, heat = 1;
let edgeFilter = null;   // isolate one connection type from the legend; null shows them all
let byFilter = null;     // isolate one agent's memories; null shows every author
let project = typeof saved.project === "string" ? saved.project : "", projects = [];
const pq = (lead) => project ? (lead || "?") + "project=" + encodeURIComponent(project) : "";
const cv = document.getElementById("c"), ctx = cv.getContext("2d");
let mouseWorld = null;
let T = { k: 1, x: 0, y: 0 };

async function loadProjects() {
  const d = await (await fetch("/api/projects")).json();
  projects = d.projects || [];
  const sel = document.getElementById("proj");
  sel.innerHTML = projects.map(p => `<option value="${esc(p.project)}">${esc(p.name)}</option>`).join("")
    + `<option value="core">core (you)</option>`;
  if (!projects.some(p => p.project === project) && project !== "core") {
    project = projects[0] ? projects[0].project : "";
    rememberView();
  }
  sel.value = project;
}

let unified = false;   // the hive has real projects, so Project view is just a zoom into one
// The scene is the hive whenever there IS a hive. Layout and forces key off this, never off `view` —
// otherwise zooming into a project silently re-scatters the neurons you were just looking at.
const hiveScene = () => unified || view === "hive";

async function load(opts = {}) {
  // ONE SCENE. Fetch the whole hive; "project" is not a different graph, it's the camera flown into
  // one cluster. That is what makes the transition a zoom instead of a page swap. A lone project with
  // no hive registered has nothing to zoom out to, so it falls back to its own graph.
  let data = await (await fetch("/api/hive")).json();
  unified = data.nodes.some(n => n.kind === "project");
  if (!unified) data = await (await fetch("/api/graph" + pq())).json();
  raw = data;
  // A LIVE refresh must not throw the layout away. Every neuron you already had keeps its exact
  // position; only newcomers get placed. Otherwise the graph explodes each time an agent writes.
  const prev = opts.keep ? byId : null;
  const prevLinks = prev ? new Set(links.map(linkKey)) : null;
  if (!prev) for (const k in colorMap) delete colorMap[k];
  byId = {};
  nodes = raw.nodes.map(n => {
    const was = prev && prev[n.id];
    return was
      ? { ...n, x: was.x, y: was.y, vx: was.vx, vy: was.vy, pin: was.pin, placed: true }
      : { ...n, x: (Math.random()-.5)*600, y: (Math.random()-.5)*600, vx: 0, vy: 0, isNew: !!prev };
  });
  nodes.forEach(n => byId[n.id] = n);
  links = raw.links.filter(l => byId[l.source] && byId[l.target]).map(l => ({ ...l, s: byId[l.source], t: byId[l.target] }));
  assignAnchors(!!prev);
  detectCommunities();

  if (prev) {
    // Real events, real motion: every genuinely new connection fires a signal down the wire, and
    // every new memory flares as it arrives.
    for (const l of links) if (!prevLinks.has(linkKey(l))) fire(l);
    for (const n of nodes) if (n.isNew) flash(n);
    heat = Math.max(heat, 0.3);   // settle the newcomers without shaking everything else loose
  } else {
    heat = 1;
  }
  await loadStale();
  buildTree(); buildLegend();
  if (!prev) flyToView(0);
  invalidate();
}

// Which memories cite code that has since changed. This is the most important thing the brain can
// tell you: its worst failure is stating something outdated with total confidence.
let staleBy = {};
async function loadStale() {
  try {
    const url = unified ? "/api/stale/hive" : "/api/stale" + pq();
    const d = await (await fetch(url)).json();
    staleBy = {};
    for (const h of d.stale || []) {
      const key = h.project ? `${h.project}|${h.memory_id}` : h.memory_id;
      staleBy[key] = h;
    }
    for (const n of nodes) {
      const hit = staleBy[`${n.group}|${bareId(n)}`] || staleBy[bareId(n)];
      n.stale = hit || null;
    }
  } catch { staleBy = {}; }
}
const bareId = n => n.id.includes("#") ? n.id.split("#")[1] : n.id;
const linkKey = l => `${l.source}|${l.target}|${l.rel}`;

// ---------- camera ----------
let cam = null;
function frameOf(list, pad = 110) {
  if (!list.length) return null;
  const xs = list.map(n => n.x), ys = list.map(n => n.y);
  const minx = Math.min(...xs), maxx = Math.max(...xs), miny = Math.min(...ys), maxy = Math.max(...ys);
  const w = cv.clientWidth, h = cv.clientHeight;
  let k = Math.min(2.2, 0.92 * Math.min(w / (maxx - minx + pad * 2), h / (maxy - miny + pad * 2)));
  if (!isFinite(k) || k <= 0) k = 1;
  return { k, x: w/2 - (minx + maxx)/2 * k, y: h/2 - (miny + maxy)/2 * k };
}
// Fly, don't cut. The zoom IS the story: you are moving through one brain, not swapping pages.
function flyTo(to, ms = 780) {
  if (!to) return;
  if (ms <= 0) { T.k = to.k; T.x = to.x; T.y = to.y; invalidate(); return; }
  cam = { from: { ...T }, to, t0: now(), ms };
  invalidate();
}
function stepCamera() {
  if (!cam) return;
  const p = Math.min(1, (now() - cam.t0) / cam.ms);
  const e = p < .5 ? 4*p*p*p : 1 - Math.pow(-2*p + 2, 3) / 2;   // easeInOutCubic
  T.k = cam.from.k + (cam.to.k - cam.from.k) * e;
  T.x = cam.from.x + (cam.to.x - cam.from.x) * e;
  T.y = cam.from.y + (cam.to.y - cam.from.y) * e;
  if (p >= 1) cam = null;
  invalidate();
}
// The neurons the camera should frame: one project when zoomed in, the whole hive when zoomed out.
function inFocus(n) { return !unified || view !== "project" || !project || n.kind === "core" || n.group === project; }
function focusNodes() { return unified && view === "project" && project ? nodes.filter(n => n.group === project) : nodes; }
function flyToView(ms) { flyTo(frameOf(focusNodes()), ms === undefined ? 780 : ms); }
function frameOn(n, k) {
  const w = cv.clientWidth, h = cv.clientHeight;
  const z = k || Math.max(T.k, 1.5);
  return { k: z, x: w/2 - n.x*z, y: h/2 - n.y*z };
}
// Jump to a memory from the activity feed, whichever view you're in.
function jumpToMemory(memId, proj) {
  const n = nodes.find(x => x.id === memId || x.id.endsWith("#" + memId));
  if (!n) { toast("that memory is not in this view"); return; }
  if (unified && view === "project" && n.group !== project) {
    project = n.group;
    document.getElementById("proj").value = project;
    rememberView(); buildTree(); buildLegend();
  }
  select(n);
  flash(n);
  flyTo(frameOn(n, Math.max(T.k, 1.6)));
}

// In hive view, give each project its own region on a ring around the core so clusters separate
// instead of piling on top of each other. Nodes start near their anchor and a gentle force holds
// them there while links still pull related neurons together.
// Both views cluster on `group`: in the hive that's the project, in a project it's the feature
// AREA. Each group gets its own region on a ring, and its neurons are held inside it. The structure
// is real (the agent filed each memory into an area), so the layout can show it instead of guessing.
function assignAnchors(keep) {
  // Every group gets a home, including "core" (the shared core store's own memories), which sits at
  // the origin rather than on the ring. A group with no anchor yields NaN coordinates.
  const groups = [...new Set(nodes.map(n => n.group))];
  const ringGroups = groups.filter(g => g !== "core");
  const isHub = n => n.kind === "project" || n.kind === "area" || n.kind === "core";

  // How many memories in each group, and in each group's area.
  const gCount = {}, gaCount = {};
  for (const n of nodes) {
    if (n.group === "core" || isHub(n)) continue;
    gCount[n.group] = (gCount[n.group] || 0) + 1;
    const k = n.group + "|" + (n.area || "");
    gaCount[k] = (gaCount[k] || 0) + 1;
  }

  if (!hiveScene()) {
    // Lone project, no hive to nest inside: the groups ARE the areas. One ring, one pocket each.
    const R = groupRingRadius(ringGroups.length);
    const ang = {};
    ringGroups.forEach((g, i) => ang[g] = (i / Math.max(1, ringGroups.length)) * Math.PI * 2);
    for (const n of nodes) {
      const a = ang[n.group];
      n.ax = a === undefined ? 0 : Math.cos(a) * R;
      n.ay = a === undefined ? 0 : Math.sin(a) * R;
      n.rmax = groupRadius(gCount[n.group] || 1);
      if (!keep || !n.placed) { n.x = n.ax + (Math.random() - .5) * 90; n.y = n.ay + (Math.random() - .5) * 90; n.placed = true; }
    }
    return;
  }

  // Hive nests: projects on an outer ring, and inside each, its AREAS get pockets on an inner ring.
  // Both radii are DERIVED from the pockets they must hold — for n pockets of radius r, the ring
  // needs r / sin(pi/n) — so a ring can never be too small for its contents.
  const info = {};
  for (const g of groups) {
    const areas = [...new Set(nodes.filter(n => n.group === g && !isHub(n)).map(n => n.area || ""))].sort();
    const rOf = a => pocketRadius(gaCount[g + "|" + a] || 1);
    const biggest = Math.max(...areas.map(rOf), 44);
    // ring radius so adjacent pockets clear each other
    const inner = areas.length <= 1 ? 0 : (biggest / Math.sin(Math.PI / areas.length)) * 1.18;
    const pockets = {};
    areas.forEach((a, i) => {
      const t = (i / Math.max(1, areas.length)) * Math.PI * 2;
      pockets[a] = { dx: Math.cos(t) * inner, dy: Math.sin(t) * inner, r: rOf(a) };
    });
    info[g] = { pockets, span: inner + biggest };
  }
  const widest = Math.max(...ringGroups.map(g => info[g].span), 120);
  const R = ringGroups.length <= 1 ? 0
    : Math.max(600, (widest / Math.sin(Math.PI / Math.max(2, ringGroups.length))) * 1.25);
  const ang = {};
  ringGroups.forEach((g, i) => ang[g] = (i / Math.max(1, ringGroups.length)) * Math.PI * 2);

  for (const n of nodes) {
    if (n.kind === "core") { n.ax = 0; n.ay = 0; n.rmax = 90; }
    else {
      const a = ang[n.group];                       // core-store memories orbit the origin
      const gx = a === undefined ? 0 : Math.cos(a) * R, gy = a === undefined ? 0 : Math.sin(a) * R;
      if (n.kind === "project") {              // the project hub sits at its own centre
        n.ax = gx; n.ay = gy; n.rmax = info[n.group].span + 40;
      } else {
        const pk = info[n.group].pockets[n.area || ""];
        n.ax = gx + (pk ? pk.dx : 0);
        n.ay = gy + (pk ? pk.dy : 0);
        n.rmax = pk ? pk.r : 60;
      }
    }
    if (!keep || !n.placed) { n.x = n.ax + (Math.random() - .5) * 70; n.y = n.ay + (Math.random() - .5) * 70; n.placed = true; }
  }
}
// Room an area needs for n memories, and how far out to place a ring of groups.
function pocketRadius(n) { return Math.max(40, Math.min(150, 20 * Math.sqrt(n) + 24)); }
function groupRadius(n) { return Math.max(70, Math.min(300, 26 * Math.sqrt(n) + 34)); }
function groupRingRadius(count) { return count <= 1 ? 0 : Math.max(380, 150 * count); }

function buildLegend() {
  const el = document.getElementById("legend");
  const order = ["area", "ref", "topic", "tag", "semantic", "hub", "cluster", "user"];
  const count = {};
  for (const l of links) count[l.rel] = (count[l.rel] || 0) + 1;
  const kinds = order.filter(r => count[r] && !(hiveScene() && r === "cluster"));

  const row = r => {
    const label = r === "tag" && view === "hive" ? "shared tag (bridge)" : edgeStyle[r].label;
    const on = !edgeFilter || edgeFilter === r;
    return `<button class="li${on ? "" : " off"}${edgeFilter === r ? " solo" : ""}" data-rel="${r}"
      aria-pressed="${edgeFilter === r}" title="Show only these">
      <span class="edge" style="background:${edgeStyle[r].color}"></span>
      <span class="lg-label">${esc(label)}</span>
      <span class="lg-count">${count[r]}</span>
    </button>`;
  };

  const how = view === "hive"
    ? "Every neuron is a memory, grouped into the <b>project</b> it belongs to. Links are real, not random: memories connect when they share a <b>topic</b>, a <b>tag</b>, or related <b>meaning</b>, and two projects bridge when they share something specific."
    : "Every neuron is a memory, grouped into the <b>area</b> of the project it belongs to (auth, billing, infra). Links connect memories that share a <b>topic</b>, a <b>tag</b>, or related <b>meaning</b>. Grey <i>unfiled</i> neurons have no area yet; they are still fully searchable.";

  // Who wrote what. A machine runs several agents, and "show me only what Codex learned" is the
  // question you actually ask when two of them disagree.
  const authors = {};
  for (const n of nodes) if (n.by) authors[n.by] = (authors[n.by] || 0) + 1;
  const names = Object.keys(authors).sort((a, b) => authors[b] - authors[a]);
  const whoRows = names.length < 2 ? "" :
    `<div class="lg-head" style="margin-top:12px">Written by</div>` +
    names.map(a => {
      const on = !byFilter || byFilter === a;
      return `<button class="li${on ? "" : " off"}${byFilter === a ? " solo" : ""}" data-by="${esc(a)}"
        aria-pressed="${byFilter === a}" title="Show only what ${esc(a)} wrote">
        <span class="edge" style="background:${authorColor(a)}"></span>
        <span class="lg-label">${esc(a)}</span>
        <span class="lg-count">${authors[a]}</span>
      </button>`;
    }).join("");

  el.innerHTML =
    `<div class="lg-head">Connections<span class="lg-help" id="lg-toggle">ⓘ how it works</span></div>` +
    kinds.map(row).join("") +
    whoRows +
    (edgeFilter || byFilter ? `<button class="lg-reset" id="lg-all">Show everything</button>` : "") +
    `<div class="lg-note" id="lg-note">${how}</div>`;

  document.getElementById("lg-toggle").onclick = () =>
    document.getElementById("lg-note").classList.toggle("show");
  const reset = document.getElementById("lg-all");
  if (reset) reset.onclick = () => { byFilter = null; setEdgeFilter(null); };
  for (const b of el.querySelectorAll(".li[data-rel]")) {
    // Click a type to isolate it; click it again to come back to everything.
    b.onclick = () => setEdgeFilter(edgeFilter === b.dataset.rel ? null : b.dataset.rel);
  }
  for (const b of el.querySelectorAll(".li[data-by]")) {
    b.onclick = () => {
      byFilter = byFilter === b.dataset.by ? null : b.dataset.by;
      buildLegend(); invalidate();
    };
  }
}

// One stable colour per agent, so claude-code is the same colour everywhere you look.
const AUTHOR_COLORS = ["#ffde59", "#6fd3ff", "#a78bfa", "#57d9a3", "#ff9f7f", "#f472b6"];
function authorColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return AUTHOR_COLORS[h % AUTHOR_COLORS.length];
}

function setEdgeFilter(rel) {
  edgeFilter = rel;
  selectedEdge = null;
  closeEdgeMenu();
  buildLegend();
  invalidate();
}

function buildTree() {
  const t = document.getElementById("tree");
  t.innerHTML = "";
  const memories = nodes.filter(n => !["core", "project", "area"].includes(n.kind));
  if (!memories.length) { t.innerHTML = `<div class="tempty">No memories yet.</div>`; return; }

  if (view === "hive") {
    // project > area > memory
    const tree = {};
    for (const n of memories) {
      const p = n.group, a = n.area || "";
      ((tree[p] = tree[p] || {})[a] = tree[p][a] || []).push(n);
    }
    for (const proj of Object.keys(tree).sort()) {
      const areas = tree[proj];
      const total = Object.values(areas).reduce((s, m) => s + m.length, 0);
      const row = folderRow(proj, total, colorFor(view, { group: proj, kind: "x" }));
      const kids = el("div", "tkids");
      for (const a of sortAreas(Object.keys(areas))) {
        const ms = areas[a];
        const arow = folderRow(areaName(a), ms.length, null);
        const akids = el("div", "tkids");
        sortByLabel(ms).forEach(m => akids.appendChild(leafRow(m)));
        twist(arow, akids);
        kids.append(arow, akids);
      }
      twist(row, kids);
      t.append(row, kids);
    }
  } else {
    // area > memory (only the project we're framed on)
    const byArea = {};
    for (const n of memories) {
      if (!inFocus(n) || n.kind === "core") continue;
      const a = unified ? (n.area || "") : (n.group || "");
      (byArea[a] = byArea[a] || []).push(n);
    }
    for (const a of sortAreas(Object.keys(byArea))) {
      const ms = byArea[a];
      const row = folderRow(areaName(a), ms.length, colorFor(view, { group: a, kind: "x" }));
      const kids = el("div", "tkids");
      sortByLabel(ms).forEach(m => kids.appendChild(leafRow(m)));
      twist(row, kids);
      t.append(row, kids);
    }
  }
}

const CHEVRON = `<svg class="tw" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4l4 4-4 4"/></svg>`;
const areaName = a => a || "unfiled";
// Real areas first (A-Z); the unfiled leftovers always sink to the bottom.
const sortAreas = ks => ks.sort((a, b) => (!a - !b) || a.localeCompare(b));
const sortByLabel = ms => ms.sort((a, b) => (a.label || "").localeCompare(b.label || ""));
function el(tag, cls) { const e = document.createElement(tag); e.className = cls; return e; }

function folderRow(name, count, color) {
  const row = el("div", "tnode folder");
  row.tabIndex = 0;
  row.setAttribute("role", "treeitem");
  row.setAttribute("aria-expanded", "false");
  row.innerHTML = CHEVRON +
    (color ? `<span class="dot" style="background:${color}"></span>` : `<span class="pad"></span>`) +
    `<span class="name">${esc(name)}</span><span class="count">${count}</span>`;
  return row;
}

function leafRow(n) {
  const row = el("div", "tnode leaf");
  row.tabIndex = 0;
  row.dataset.id = n.id;
  row.innerHTML = `<span class="pad"></span><span class="dot" style="background:${colorFor(view, n)};opacity:.55"></span>` +
    `<span class="name">${esc(n.label || n.id)}</span>`;
  row.onclick = () => select(n);
  row.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); select(n); } };
  return row;
}

// Wire a folder row to expand/collapse the children under it.
function twist(row, kids) {
  const toggle = () => {
    const open = kids.classList.toggle("open");
    row.classList.toggle("open", open);
    row.setAttribute("aria-expanded", String(open));
  };
  row.onclick = toggle;
  row.onkeydown = e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); } };
}

function tick() {
  // The model, top to bottom:
  //  - repulsion (1/d²) spreads neurons apart so they don't overlap;
  //  - short, firm links pull connected neurons into tight flowers (a topic/tag hub + its petals);
  //  - a gentle pull toward each community's centre separates the sub-clusters into their own bubbles;
  //  - every neuron is kept inside its project's region (hive) or the canvas (project) by a hard clamp,
  //    so lone, link-less neurons stay home instead of scattering.
  const rep = hiveScene() ? 2000 : 2800;
  for (let i = 0; i < nodes.length; i++) {
    const a = nodes[i];
    for (let j = i+1; j < nodes.length; j++) {
      const b = nodes[j];
      let dx = a.x-b.x, dy = a.y-b.y, d2 = dx*dx+dy*dy+.01;
      const f = rep/d2, d = Math.sqrt(d2), ux = dx/d, uy = dy/d;
      a.vx += ux*f; a.vy += uy*f; b.vx -= ux*f; b.vy -= uy*f;
    }
  }
  for (const l of links) {
    let dx = l.t.x-l.s.x, dy = l.t.y-l.s.y, d = Math.hypot(dx,dy)+.01;
    const rest = l.rel === "hub" ? 180 : l.rel === "cluster" ? 150 : l.rel === "area" ? 58 : l.rel === "semantic" ? 62 : 52;
    const k = (l.rel === "hub" || l.rel === "cluster") ? 0.01 : l.rel === "area" ? 0.05 : 0.06;
    const f = (d-rest)*k, ux = dx/d, uy = dy/d;
    l.s.vx += ux*f; l.s.vy += uy*f; l.t.vx -= ux*f; l.t.vy -= uy*f;
  }
  const cx = {}, cy = {}, cc = {};
  for (const n of nodes) { cx[n.comm] = (cx[n.comm]||0)+n.x; cy[n.comm] = (cy[n.comm]||0)+n.y; cc[n.comm] = (cc[n.comm]||0)+1; }
  for (const n of nodes) {
    if (cc[n.comm] > 1) { n.vx += (cx[n.comm]/cc[n.comm] - n.x) * 0.015; n.vy += (cy[n.comm]/cc[n.comm] - n.y) * 0.015; }
    const hx = n.ax != null ? n.ax : 0, hy = n.ay != null ? n.ay : 0;
    n.vx += (hx - n.x) * (n.ax != null ? 0.02 : 0.004);
    n.vy += (hy - n.y) * (n.ax != null ? 0.02 : 0.004);
    const sp = Math.hypot(n.vx, n.vy); if (sp > 24) { n.vx = n.vx/sp*24; n.vy = n.vy/sp*24; }
    if (n.pin) { n.vx = n.vy = 0; continue; }
    n.x += n.vx*heat; n.y += n.vy*heat; n.vx *= 0.85; n.vy *= 0.85;
    // Hard boundary: no neuron may leave its cluster's disc.
    const rmax = n.rmax || 300;
    const ox = n.x - hx, oy = n.y - hy, od = Math.hypot(ox, oy);
    if (od > rmax) { n.x = hx + ox/od*rmax; n.y = hy + oy/od*rmax; n.vx *= 0.4; n.vy *= 0.4; }
  }
  // Seat each hub at the centre of its OWN cluster: a project hub on all its memories, an area hub
  // on that area's alone. Note `group` means the project in the hive and the area in a project, so
  // an area hub must be keyed by group+area, never group.
  const gx = {}, gy = {}, gn = {};      // per project/group
  const ax = {}, ay = {}, an = {};      // per group|area
  for (const n of nodes) {
    if (n.kind === "project" || n.kind === "core" || n.kind === "area") continue;
    gx[n.group] = (gx[n.group]||0)+n.x; gy[n.group] = (gy[n.group]||0)+n.y; gn[n.group] = (gn[n.group]||0)+1;
    const k = n.group + "|" + (n.area || "");
    ax[k] = (ax[k]||0)+n.x; ay[k] = (ay[k]||0)+n.y; an[k] = (an[k]||0)+1;
  }
  for (const n of nodes) {
    if (n.kind === "project" && gn[n.group]) {
      n.x = gx[n.group]/gn[n.group]; n.y = gy[n.group]/gn[n.group]; n.vx = n.vy = 0;
    } else if (n.kind === "area") {
      const k = n.group + "|" + (n.area || "");
      if (an[k]) { n.x = ax[k]/an[k]; n.y = ay[k]/an[k]; n.vx = n.vy = 0; }
    }
  }
  heat *= 0.985; if (heat < 0.03) heat = 0;
}

function draw() {
  const w = cv.width = cv.clientWidth * devicePixelRatio, h = cv.height = cv.clientHeight * devicePixelRatio;
  ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,w,h);

// Communities of densely-connected neurons (label propagation over content links only, ignoring the

function detectCommunities() {
  const adj = {};
  for (const n of nodes) { adj[n.id] = []; n.comm = n.id; }
  for (const l of links) {
    if (l.rel === "hub" || l.rel === "cluster") continue;
    adj[l.source].push(l.target); adj[l.target].push(l.source);
  }
  for (let iter = 0; iter < 8; iter++) {
    let changed = false;
    for (const n of nodes) {
      const nb = adj[n.id]; if (!nb.length) continue;
      const counts = {};
      for (const m of nb) { const c = byId[m].comm; counts[c] = (counts[c]||0)+1; }
      let best = n.comm, bc = -1;
      for (const c in counts) if (counts[c] > bc || (counts[c] === bc && c < best)) { bc = counts[c]; best = c; }
      if (best !== n.comm) { n.comm = best; changed = true; }

function radius(n) { return n.kind === "core" ? 6.5 : n.kind === "project" ? 5.5 : n.kind === "area" ? 5.5 : 2 + Math.min(2.6, n.degree * 0.3); }

const now = () => performance.now();

    const e = 1 - Math.pow(1 - p, 2.2);

// TIME. The ledger is append-only, so the graph can be rewound: show only what existed at a moment,

let timeAt = null, visibleSet = null, playing = null;

  // A hub only exists once something is filed under it.
  for (const n of nodes) {
    if (!isHubKind(n)) continue;

    const has = nodes.some(m => !isHubKind(m) && vis.has(m) && m.group === n.group &&

let rest = 1;   // how visible the rest of the hive is while a project is framed

function loop() {

function fit() {
  if (!nodes.length) return;
  const xs = nodes.map(n=>n.x), ys = nodes.map(n=>n.y);
  const minx = Math.min(...xs), maxx = Math.max(...xs), miny = Math.min(...ys), maxy = Math.max(...ys);

    const d = Math.hypot(n.x-p.x, n.y-p.y);

async function select(n) {
  selected = n; selectedEdge = null; invalidate();

  document.querySelectorAll(".tnode.sel").forEach(e => e.classList.remove("sel"));
  const leaf = document.querySelector(`.tnode[data-id="${CSS.escape(n.id)}"]`);
  if (leaf) { leaf.classList.add("sel"); leaf.scrollIntoView({ block: "nearest" }); leaf.parentElement.classList.add("open"); }
  const d = document.getElementById("detail");
  const nb = [...neighbors(n)].length;
  let body = n.snippet || "";
  const editable = view === "project" && !["core", "area", "project"].includes(n.kind);
  const url = n.id.includes("#")
    ? `/api/hive/memory?project=${encodeURIComponent(n.group)}&id=${encodeURIComponent(n.id.split("#")[1])}`
    : (["core", "area", "project"].includes(n.kind) ? null : "/api/memory/" + encodeURIComponent(n.id) + pq());
  let trail = null;
  if (url) {
    try { const full = await (await fetch(url)).json(); if (full && full.body) body = full.body; } catch {}
    // Git-like lineage: what this replaced, what replaced it, who wrote it, what has used it.
    const pq2 = unified && n.group ? `?project=${encodeURIComponent(n.group)}` : pq();
    try { trail = await (await fetch("/api/provenance/" + encodeURIComponent(bareId(n)) + pq2)).json(); } catch {}
  }
  if (token !== selectToken) return;   // a newer selection won while we were fetching
  selectedBody = body;
  const long = body.length > 420;
  const shown = long ? esc(body.slice(0, 420)).trimEnd() + "…" : esc(body);
  const st = n.stale;
  const warn = st ? (st.relocated_to
    ? `<div class="warn moved"><b>The code this cites moved.</b><span>${esc(st.symbol)} is now in ${esc(st.relocated_to)}. The memory is probably still true, it just points at the old place.</span></div>`
    : `<div class="warn"><b>The code this cites has changed.</b><span>${esc(st.symbol)} in ${esc(st.file_path)} is not what it was when this was written. This memory may now be wrong.</span></div>`) : "";

  const refs = (list, verb) => (list && list.length)
    ? list.map(m => `<div class="lin-row" data-act="goto" data-id="${esc(m.id)}"><span class="lin-verb">${verb}</span><span class="lin-topic">${esc(m.topic || m.id)}</span></div>`).join("")

    : "";
  const prov = trail
    ? `<div class="sec">Provenance</div><div class="meta">written by <b>${esc(trail.written_by || "unknown")}</b>` +
      (recalls ? ` · recalled <b>${recalls}</b> time${recalls === 1 ? "" : "s"}` : " · never recalled yet") +

    ? `<span class="by" style="border-color:${authorColor(n.by)};color:${authorColor(n.by)}">${esc(n.by)}</span>`
    : "";

  d.innerHTML = `<span class="x" data-act="closedetail">✕</span>
    <span class="k">${n.kind}${n.group && (view === "hive" || unified) ? " · " + esc(n.group) : ""}${n.area ? " · " + esc(n.area) : ""}</span>
    <h3>${esc(n.label || n.id)}</h3>
    ${author}
    ${warn}
    <div class="body">${shown}</div>` +
    (long ? `<button class="more" onclick="expandBody(this)">read more</button>` : "") +
    lineage + prov +
    `<div class="meta">${nb} connection(s)<br>${esc(bareId(n))}</div>` +
    (editable ? `<div class="acts"><button data-act="edit" data-id="${esc(n.id)}">Edit</button><button class="danger" data-act="del" data-id="${esc(n.id)}">Delete</button></div>` : "");
  d.classList.add("show");
}
let selectedBody = "";

const enc = encodeURIComponent;
// Returns true only if the write actually landed. Callers must not claim success on their own.
async function post(kind, s, t, proj) {
  const scope = proj ? `&project=${enc(proj)}` : pq("&");
  try {
    const r = await fetch(`/api/${kind}?source=${enc(s)}&target=${enc(t)}` + scope, { method: "POST" });
    const body = await r.json().catch(() => ({}));
    if (!r.ok || body.error) { toast(body.error || `couldn't ${kind} (${r.status})`); return false; }
    return true;
  } catch (e) {
    toast("couldn't reach the server");
    return false;
  }
}
async function removeLink(l) {
  const a = linkRef(l.s), b = linkRef(l.t);
  if (!a || !b || a.project !== b.project) { toast("that link can't be edited here"); return false; }
  return await post(l.rel === "user" ? "unlink" : "hide", a.id, b.id, a.project);
}

// A link opens the SAME panel a neuron does: what it is, which two memories it joins, what you can
// do to it. A bare context menu told you none of that, and with links overlapping you could not even
// tell which one you had hit.
function openEdgeMenu(l) {
  selected = null; selectedEdge = l; invalidate();
  document.querySelectorAll(".tnode.sel").forEach(e => e.classList.remove("sel"));
  const d = document.getElementById("detail");
  const label = (edgeStyle[l.rel] || {}).label || l.rel;
  const end = n => `<div class="pair-row"><span class="dot" style="background:${colorFor(view, n)}"></span>${esc(n.label || n.id)}</div>`;
  const drawn = l.rel === "user";
  d.innerHTML = `<span class="x" data-act="closeedge">✕</span>
    <span class="k">connection</span>
    <h3>${esc(label)}</h3>
    <div class="pair">${end(l.s)}<div class="pair-wire"></div>${end(l.t)}</div>
    <div class="meta">${drawn
      ? "You drew this link by hand."
      : "Marrow inferred this link. Removing it hides it from the graph; the memories stay."}</div>
    <div class="acts col">
      <button class="danger" data-act="edge-remove">Remove this link</button>
      <button data-act="edge-insert">Insert a memory between</button>
      <button data-act="edge-reconnect">Reconnect an end</button>
    </div>`;
  d.classList.add("show");
}
function closeEdgeMenu() {
  if (!selectedEdge) return;
  selectedEdge = null;
  document.getElementById("detail").classList.remove("show");
  invalidate();
}
async function restoreLink(l) {
  const a = linkRef(l.s), b = linkRef(l.t);
  if (!a || !b) return false;
  return await post(l.rel === "user" ? "link" : "unhide", a.id, b.id, a.project);
}
async function removeEdge() {
  const l = selectedEdge; closeEdgeMenu();
  if (!l || !await removeLink(l)) return;
  toast("link removed", async () => { if (await restoreLink(l)) await load(); });
  await load();
}
function insertBetween() { const l = selectedEdge; closeEdgeMenu(); if (!l) return; pendingInsert = { source: l.source, target: l.target, rel: l.rel }; memForm(null); }
function startReconnect() { const l = selectedEdge; closeEdgeMenu(); if (!l) return; reconnect = { keep: l.source, drop: l.target, rel: l.rel }; setHint(); toast("click the memory to connect this end to"); }
async function finishReconnect(n) {
  const rc = reconnect; reconnect = null; setHint();
  if (!rc || n.id === rc.keep) { toast("reconnect cancelled"); return; }
  await removeLink({ rel: rc.rel, s: byId[rc.keep], t: byId[rc.drop], source: rc.keep, target: rc.drop });
  const keep = linkRef(byId[rc.keep]), to = linkRef(n);
  if (!keep || !to || keep.project !== to.project) { toast("a link has to stay inside one project"); return; }
  await post("link", keep.id, to.id, keep.project);
  toast("reconnected"); await load();
}
function setHint() { document.getElementById("hint").textContent = reconnect ? "reconnect: click the memory to connect this end to" : linkMode ? "" : "drag to pan · scroll to zoom · drag a neuron · click a link to edit it · keys: esc, arrows, +/−, F fit, H/P view"; }
cv.addEventListener("dblclick", e => { const n = nodeAt(e.offsetX, e.offsetY); if (n) n.pin = false; });
cv.addEventListener("wheel", e => {
  e.preventDefault();
  const s = e.deltaY < 0 ? 1.12 : 0.89, wx = (e.offsetX - T.x)/T.k, wy = (e.offsetY - T.y)/T.k;
  T.k = Math.max(0.15, Math.min(5, T.k*s)); T.x = e.offsetX - wx*T.k; T.y = e.offsetY - wy*T.k;
  invalidate();
}, { passive: false });

function zoomBy(s) {
  const cx = cv.clientWidth/2, cy = cv.clientHeight/2, wx = (cx - T.x)/T.k, wy = (cy - T.y)/T.k;
  T.k = Math.max(0.15, Math.min(5, T.k*s)); T.x = cx - wx*T.k; T.y = cy - wy*T.k;
  invalidate();
}
// Keyboard: Esc backs out (modal -> link mode -> selection -> filter), arrows pan, +/- zoom,
// F recenters, H/P switch views. Ignored while typing in a field.
window.addEventListener("keydown", e => {
  const typing = /^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName);
  // Esc always works, even from inside a field — otherwise the modal is a keyboard trap.
  if (typing && e.key === "Escape" && document.getElementById("modal").classList.contains("show")) {
    closeModal(); e.preventDefault(); return;
  }
  if (typing) return;
  const step = 70;
  switch (e.key) {
    case "Escape":
      if (document.getElementById("modal").classList.contains("show")) closeModal();
      else if (linkMode || reconnect) { setLinkMode(false); }
      else if (selectedEdge) closeEdgeMenu();
      else if (selected) closeDetail();
      else { document.getElementById("search").value = ""; filter = ""; }
      break;
    case "ArrowLeft": T.x += step; break;
    case "ArrowRight": T.x -= step; break;
    case "ArrowUp": T.y += step; break;
    case "ArrowDown": T.y -= step; break;
    case "+": case "=": zoomBy(1.15); break;
    case "-": case "_": zoomBy(0.87); break;
    case "f": case "F": case "0": flyToView(); break;
    case "h": case "H": setView("hive"); break;
    case "p": case "P": setView("project"); break;
    default: return;
  }
  e.preventDefault();
});

function showTip(px, py) {
  // The tip lives inside .stage, so it must be placed with stage-relative (canvas) coords, not the
  // viewport clientX/Y — otherwise it lands offset by the sidebar width and header height.
  const n = nodeAt(px, py), tip = document.getElementById("tip");
  if (n) { tip.style.display = "block"; tip.style.left = (px+14)+"px"; tip.style.top = (py+14)+"px";
    tip.innerHTML = `<b>${esc(n.label||n.id)}</b><br>${esc((n.snippet||"").slice(0,120))}`; }
  else tip.style.display = "none";
}

document.getElementById("search").addEventListener("input", e => { filter = e.target.value.toLowerCase(); invalidate(); });
document.getElementById("linkmode").onclick = () => setLinkMode(!linkMode);

// Link mode is a two-step gesture, so SAY so — and show the wire following the cursor, so it's
// obvious you're mid-connection rather than just clicking around.
function setLinkMode(on) {
  linkMode = on;
  linkFrom = null;
  reconnect = null;
  closeEdgeMenu();
  document.getElementById("linkmode").classList.toggle("on", on);
  document.querySelector(".stage").classList.toggle("linking", on);
  invalidate();
  drawLinkbar();
  setHint();
}
function drawLinkbar() {
  const bar = document.getElementById("linkbar");
  bar.classList.toggle("show", linkMode);
  if (!linkMode) return;
  bar.innerHTML = linkFrom
    ? `<span class="step">2</span>Now click the neuron to connect it to — <b>${esc(linkFrom.label || linkFrom.id)}</b><kbd>Esc</kbd>to cancel`
    : `<span class="step">1</span>Click a neuron to start the link<kbd>Esc</kbd>to cancel`;
}
document.getElementById("refit").onclick = () => flyToView();
function rememberView() {
  try { localStorage.setItem("marrow.view", JSON.stringify({ view, project })); } catch {}
}
function setView(v) {
  view = v; rememberView(); selected = null; edgeFilter = null; closeDetail(); closeEdgeMenu(); linkFrom = null; reconnect = null;
  if (linkMode) setLinkMode(false);
  setHint();
  for (const t of ["project", "hive", "channel"]) {
    const b = document.getElementById("tab-" + t);
    b.classList.toggle("on", v === t);
    b.setAttribute("aria-selected", String(v === t));
  }
  const graph = v !== "channel";
  document.getElementById("proj").hidden = v !== "project";      // the hive spans every project
  document.getElementById("dock").hidden = !graph;               // the dock acts on the canvas
  document.getElementById("linkmode").hidden = !graph;
  document.getElementById("channel").classList.toggle("show", v === "channel");
  document.getElementById("legend").style.display = graph ? "" : "none";
  document.getElementById("hint").style.display = graph ? "" : "none";
  if (v === "channel") { loadChannel(); return; }
  // Same scene: if it's already loaded, just fly. Only fetch when we have nothing.
  if (nodes.length && unified) {
    for (const k in colorMap) delete colorMap[k];   // zoomed out we colour projects, zoomed in areas
    buildTree(); buildLegend(); flyToView(); invalidate();
  }
  else load();
}
async function loadChannel() {
  const el = document.getElementById("channel");
  let rooms = [];
  try { rooms = (await (await fetch("/api/channel")).json()).rooms || []; } catch {}
  if (!rooms.length) {
    el.innerHTML = `<div class="empty">No agent conversations yet.<br><br>This is where your agents talk to each other — a Claude Code session and a
      Codex session reach each other here, each conversation in its own room. Agents use mem_ask / mem_rooms / mem_inbox / mem_reply.</div>`;
    return;
  }
  // Rooms are collapsed by default and the newest opens: a busy channel should be scannable by
  // subject, not a wall of every message ever sent.
  el.innerHTML = `<div class="wrap"><div class="ch-head">${rooms.length} room(s) — most recently active first. Click one to read it.</div>` +
    rooms.map((r, i) => `
      <div class="thread${i === 0 ? " open" : ""}" data-room="${esc(r.thread)}">
        <div class="room-head">
          <span class="caret">▶</span>
          <span class="subject">${esc(r.topic || "(no subject)")}</span>
          <span class="meta">${r.messages.length} message${r.messages.length === 1 ? "" : "s"} · ${ago(r.last_ts)}<br>
            ${(r.participants || []).map(p => `<span class="who-chip">${esc(p)}</span>`).join("")}</span>
        </div>
        <div class="room-body">` + r.messages.map(m => `
          <div class="msg ${m.role === "reply" ? "reply" : "ask"}">
            <div class="who">${esc(m.from)}${m.role === "ask" && m.to !== "all" ? " → " + esc(m.to) : ""} · ${ago(m.ts)}</div>
            <div class="bubble">${esc(m.body)}</div>
          </div>`).join("") + `</div>
      </div>`).join("") + `</div>`;

  el.querySelectorAll(".room-head").forEach(h =>
    h.onclick = () => h.parentElement.classList.toggle("open"));
}

document.getElementById("tab-hive").onclick = () => setView("hive");

const KINDS = ["fact", "decision", "entity", "session", "skill"];
function memForm(e) {
  const isEdit = !!e;
  modal(`<h3>${isEdit ? "Edit memory" : "Add memory"}</h3>
    <label>Kind</label>
    <select id="f-kind" ${isEdit ? "disabled" : ""}>${KINDS.map(k => `<option ${e && e.kind === k ? "selected" : ""}>${k}</option>`).join("")}</select>

async function saveMem(id) {
  const kind = document.getElementById("f-kind").value;
  const topic = document.getElementById("f-topic").value.trim();
  const body = document.getElementById("f-body").value.trim();
  const tags = document.getElementById("f-tags").value.split(",").map(s => s.trim()).filter(Boolean);
  if (!body) { toast("a memory needs a body"); return; }
  const payload = JSON.stringify(id ? { topic, body, tags } : { kind, topic, body, tags });
  const url = id ? `/api/memory/${encodeURIComponent(id)}/edit${pq()}` : `/api/memory${pq()}`;
  const r = await (await fetch(url, { method: "POST", body: payload })).json();
  if (r.ok === false || r.error) { toast(r.error || "could not save"); return; }
  // Inserting a memory in the middle of a link: connect it to both ends, drop the original.
  if (!id && pendingInsert && r.id) {
    await post("link", pendingInsert.source, r.id);
    await post("link", pendingInsert.target, r.id);
    await removeLink({ rel: pendingInsert.rel, source: pendingInsert.source, target: pendingInsert.target });
    pendingInsert = null;
  }
  closeModal(); toast(id ? "saved" : "added"); await load();
}
async function editMem(id) {
  const m = await (await fetch(`/api/memory/${encodeURIComponent(id)}${pq()}`)).json();
  memForm({ id, kind: m.type, topic: m.topic || "", body: m.body || "", tags: m.tags || [] });
}
async function delMem(id) {
  if (!confirm("Delete this memory permanently?")) return;
  await fetch(`/api/memory/${encodeURIComponent(id)}/delete${pq()}`, { method: "POST" });
  closeModal(); closeDetail(); toast("deleted"); await load();
}

// ---------- the time machine ----------
let span = null;   // [oldest, newest] birth dates in the scene
function timeSpan() {
  const born = nodes.filter(n => n.born).map(n => n.born).sort();
  return born.length ? [born[0], born[born.length - 1]] : null;
}
const atFraction = f => {
  if (!span) return null;
  const a = new Date(span[0]).getTime(), b = new Date(span[1]).getTime();
  return new Date(a + (b - a) * f).toISOString();
};
function setTime(f) {
  const range = document.getElementById("tl-range");
  range.style.setProperty("--p", (f * 100) + "%");
  timeAt = f >= 1 ? null : atFraction(f);     // dragged to the end = live
  computeVisible();
  const total = nodes.filter(n => !isHubKind(n)).length;
  const shown = timeAt ? [...visibleSet].filter(n => !isHubKind(n)).length : total;
  document.getElementById("tl-when").textContent = timeAt
    ? new Date(timeAt).toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })
    : "now";
  document.getElementById("tl-count").textContent = `${shown} of ${total} memories`;
  invalidate();
}
function stopPlay() {
  if (playing) { cancelAnimationFrame(playing); playing = null; }
  document.getElementById("tl-play").innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M5.6 3.4l7 4.6-7 4.6z"/></svg>`;
}
// Replay the brain's growth. This is what "episodic memory" actually MEANS, made watchable.
function play() {
  const range = document.getElementById("tl-range");
  stopPlay();
  const REPLAY_MS = 14000;
  const t0 = now();
  document.getElementById("tl-play").innerHTML = `<svg viewBox="0 0 16 16" fill="currentColor"><rect x="4.4" y="3.2" width="2.8" height="9.6" rx="1.1"/><rect x="8.8" y="3.2" width="2.8" height="9.6" rx="1.1"/></svg>`;
  const step = () => {
    const f = Math.min(1, (now() - t0) / REPLAY_MS);
    range.value = String(Math.round(f * 1000));
    setTime(f);
    if (f < 1) playing = requestAnimationFrame(step);
    else stopPlay();
  };
  playing = requestAnimationFrame(step);
}

document.getElementById("tl-range").oninput = e => { stopPlay(); setTime(e.target.value / 1000); };
document.getElementById("tl-play").onclick = () => { playing ? stopPlay() : play(); };
document.getElementById("history").onclick = () => {
  const tl = document.getElementById("tl");
  const on = tl.hidden;
  tl.hidden = !on;
  document.getElementById("history").classList.toggle("on", on);
  if (on) {
    span = timeSpan();
    document.getElementById("tl-range").value = "1000";
    setTime(1);
    loadAudit();
  } else { stopPlay(); timeAt = null; visibleSet = null; invalidate(); }
};

// "Tamper-evident" is a claim. Prove it.
async function loadAudit() {
  const el = document.getElementById("tl-audit");
  try {
    const d = await (await fetch(unified ? "/api/audit/hive" : "/api/audit" + pq())).json();
    const n = (d.events || 0).toLocaleString();
    el.classList.toggle("broken", !d.ok);
    el.innerHTML = d.ok
      ? `<b>chain intact</b><br>${n} events`
      : `<b>chain broken</b><br>at #${d.broken_at_seq}`;
  } catch { el.textContent = ""; }
}

document.getElementById("help").onclick = helpModal;

// LIVE. Poll a cheap fingerprint; only refetch the graph when something actually changed. Agents
// write memories while you watch, so the brain should show it happening rather than going stale.
let rev = null, livePaused = false;
const VERBS = { write: "wrote", supersede: "revised", retrieve: "recalled", claim: "claimed",
  release: "released", progress: "worked on", session_started: "started", finished: "finished",
  consolidate: "consolidated", observe: "noted", message: "messaged" };

async function pulse() {
  if (document.hidden || livePaused || view === "channel") return;
  try {
    const q = view === "hive" ? "?view=hive" : pq();
    const d = await (await fetch("/api/pulse" + q)).json();
    if (rev !== null && d.rev !== rev) await load({ keep: true });   // keep the layout, animate what's new
    rev = d.rev;
    renderLive(d.activity || []);
  } catch {}
}

// Only touch the DOM for rows that are actually NEW, or every poll re-runs the entry
// animation on every row, so the whole panel strobed even when nothing had happened.
let liveSeen = new Set();
function renderLive(events) {
  const box = document.getElementById("live"), rows = document.getElementById("live-rows");
  if (!events.length) { box.hidden = true; return; }
  box.hidden = false;

  const fresh = events.filter(e => !liveSeen.has(e.id));
  if (!fresh.length) return;                       // nothing new: leave the panel completely alone
  const first = liveSeen.size === 0;               // first paint shouldn't animate a whole backlog in

  // Newest first, so prepend in reverse and let the older rows shift down beneath them.
  for (const e of fresh.slice().reverse()) {
    liveSeen.add(e.id);
    const verb = VERBS[e.kind] || e.kind;
    const what = (e.summary || "").replace(/^[a-z_]+:\s*/i, "");
    // Most summaries are already a sentence ("wrote fact 'x'"); prefixing the verb again read
    // "wrote wrote fact 'x'".
    const line = what.toLowerCase().startsWith(verb.toLowerCase()) ? what : `${verb} ${what}`;
    const row = document.createElement("div");
    row.className = "live-row" + (first ? " nofade" : "");
    if (e.memory) { row.classList.add("jump"); row.dataset.mem = e.memory; if (e.project) row.dataset.proj = e.project; }
    row.innerHTML = `<span class="who">${esc(e.actor || "agent")}</span>` +
      `<span class="what">${esc(line)}</span>` +
      `<span class="when" data-ts="${esc(e.ts)}">${ago(e.ts)}</span>`;
    rows.prepend(row);
  }
  while (rows.children.length > 6) rows.lastChild.remove();
  // Keep the relative times honest without re-rendering anything.
  for (const w of rows.querySelectorAll(".when")) w.textContent = ago(w.dataset.ts);
  if (liveSeen.size > 400) liveSeen = new Set(events.map(e => e.id));
}

// Click an activity row to go to the memory it mentions, whichever view you're in.
document.getElementById("live-rows").onclick = e => {
  const row = e.target.closest(".jump");
  if (!row) return;
  jumpToMemory(row.dataset.mem, row.dataset.proj);
};

function ago(ts) {
  const s = Math.max(0, (Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60) return "now";
  if (s < 3600) return `${Math.floor(s/60)}m`;
  if (s < 86400) return `${Math.floor(s/3600)}h`;
  return `${Math.floor(s/86400)}d`;
}

document.getElementById("live-x").onclick = () => {
  livePaused = !livePaused;
  const b = document.getElementById("live-x");
  b.setAttribute("aria-expanded", String(!livePaused));
  b.setAttribute("aria-label", livePaused ? "Expand activity" : "Collapse activity");
  b.title = livePaused ? "Expand" : "Collapse";
  document.getElementById("live").classList.toggle("collapsed", livePaused);
};

loadProjects().then(() => setView(view)).then(() => { pulse(); setInterval(pulse, 2500); });
loop();
</script>
