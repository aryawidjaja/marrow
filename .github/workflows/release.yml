name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }} --bin marrow --bin marrow-mcp --bin marrow-serve
      - name: Package
        shell: bash
        run: |
          dist="marrow-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir "$dist"
          cp target/${{ matrix.target }}/release/marrow target/${{ matrix.target }}/release/marrow-mcp target/${{ matrix.target }}/release/marrow-serve "$dist"/
          cp README.md llms.txt LICENSE LICENSE-APACHE COMMERCIAL.md "$dist"/
          tar czf "$dist.tar.gz" "$dist"
      - uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true

  # Auto-bump the Homebrew tap formula to the new tag (no manual SHA editing).
  # Requires a repo secret HOMEBREW_TAP_TOKEN: a fine-grained PAT with Contents: Read+Write
  # on aryawidjaja/homebrew-marrow.
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Compute source tarball sha256
        id: src
        run: |
          tag="${GITHUB_REF_NAME}"
          sha=$(curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${tag}.tar.gz" | sha256sum | awk '{print $1}')
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
      - name: Check out the tap
        uses: actions/checkout@v4
        with:
          repository: aryawidjaja/homebrew-marrow
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Bump and push the formula
        run: |
          tag="${GITHUB_REF_NAME}"; ver="${{ steps.src.outputs.version }}"
          f="Formula/marrow.rb"
          sed -i -E "s#archive/refs/tags/v[0-9.]+\.tar\.gz#archive/refs/tags/${tag}.tar.gz#" "$f"
          sed -i -E "s#sha256 \"[0-9a-f]{64}\"#sha256 \"${{ steps.src.outputs.sha }}\"#" "$f"
          sed -i -E "s#assert_match \"marrow [0-9.]+\"#assert_match \"marrow ${ver}\"#" "$f"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$f"
          git diff --cached --quiet || git commit -m "marrow ${ver}"
          git push
